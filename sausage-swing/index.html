<!doctype html>
<html lang="en">

<body>
<div id="wrap"><canvas id="c"></canvas></div>
<div id="nameov">
  <div class="card">
    <div class="ttl">Your nickname 🌭</div>
    <input id="nameinput" maxlength="10" placeholder="YOUR NAME" autocomplete="off" autocorrect="off" autocapitalize="characters">
    <br><button id="namebtn">Save</button>
  </div>
</div>
<script>
"use strict";
/* ============================================================================
   SAUSAGE SWING  —  swing a stick-limbed sausage tree to tree, dodge hazards,
   collect mini-sausages, grab the frying pan, and battle a gorilla boss.

   Controls:
     • Tap the TOP OF A TREE to shoot a rope and swing to it.
     • Hold to keep swinging, let go to fly.
     • SHAKE the phone to swing higher (or press P on a keyboard).
     • Tap with a SECOND finger to climb up the rope.
   ========================================================================== */

const cvs = document.getElementById('c');
const ctx = cvs.getContext('2d');

const VW = 480, VH = 854;
let scale = 1, offX = 0, offY = 0, dpr = 1;
function resize(){
  dpr = Math.min(window.devicePixelRatio || 1, 3);
  const w = window.innerWidth, h = window.innerHeight;
  scale = Math.min(w / VW, h / VH);
  offX = (w - VW * scale) / 2; offY = (h - VH * scale) / 2;
  cvs.style.width = w + 'px'; cvs.style.height = h + 'px';
  cvs.width = Math.round(w * dpr); cvs.height = Math.round(h * dpr);
}
window.addEventListener('resize', resize); resize();

// Screen point -> world point (x offset by camera).
function toWorld(clientX, clientY){
  return { x: (clientX - offX) / scale + game.camX, y: (clientY - offY) / scale };
}

/* ---------- RNG ---------- */
function mulberry32(a){
  return function(){
    a |= 0; a = (a + 0x6D2B79F5) | 0;
    let t = Math.imul(a ^ (a >>> 15), 1 | a);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

/* ---------- Tunables ---------- */
const G           = 0.37;  // a touch slower / gentler swinging
const AIR         = 0.994;
const GRAPPLE     = 400;   // how far the player can physically reach a vine
const TAP_TOL     = 100;   // how close your tap must be to a treetop
const RELEASE_KICK= 1.07;
const MAXV        = 23;
const CLIFF_TOP   = Math.round(VH * 0.60);
const CLIFF_W     = 240;
const STAND_DY    = 63;    // lift so the sausage's feet rest ON the grass
const CLIMB_SPEED = 3.2;   // rope shortening per step while climbing
const CLIMB_MIN   = 70;
const SHAKE_BOOST = 2.4;   // tangential speed added per shake/pump
const SHAKE_THRESH= 7;     // lower = easier to trigger a shake
const HELPER_CAP  = 6;
const START_LIVES = 5;
const GAME_VERSION = 'v16';   // shown on the menu; bump with each release
const WALK        = 3.8;   // boss: walk speed (on-screen buttons)
const JUMP_V      = 11.5;  // boss: jump strength
const BG          = 0.6;   // boss: gravity (snappy platforming)

/* ---------- Game state ---------- */
const S = { MENU:0, PLAY:1, DYING:2, CLEAR:3, OVER:4, BOSS:5, BOSSWIN:6 };
const game = {
  state: S.MENU, level: 1, lives: START_LIVES, score: 0,
  best: +(localStorage.getItem('sausageBest') || 0),
  coins: 0,                       // mini-sausages banked this run (become boss helpers)
  gold: +(localStorage.getItem('sausageGold') || 0),   // gold coins — persistent, for the shop
  camX: 0, shake: 0, t: 0, timer: 0,
  armed: false, panUses: 0, panMsg: 0, arena: false, hint: 0, diedInBoss: false, newIdx: -1, viewBoard: false, paused: false,
  rank: null, party: (localStorage.getItem('sausageParty')==='on'), eggTaps: 0, partyMsg: 0, bossHP: 0,
  resetArm: 0,                    // menu "reset to zone 1" needs a confirming second tap
};
const RESETBTN = { x:VW-58, y:34, w:96, h:30 };   // menu-only reset button hit-box (top-right)
const LBBTN = { x:34, y:VH-48, r:26 };     // in-play "view leaderboard" button (bottom-left)
const MUTEBTN = { x:VW-34, y:VH-48, r:24 }; // music mute toggle (bottom-right, menu + play)

let player, anchors, trees, monkeys, bananas, particles, clouds, pan, level,
    coins, goldcoins, birds, coconuts, spikes, bees, powerups, boss, floatTexts;
function addGold(k){ game.gold += k; try { localStorage.setItem('sausageGold', game.gold); } catch(_){} }
let runSeed = 0x5eed1;           // randomized each new game so every run differs

/* ---------- Online leaderboard (Supabase REST) ---------- */
const SUPA_URL = 'https://axrnphdvytqgzuqvdymr.supabase.co';
const SUPA_KEY = 'sb_publishable_qyfqIQo0NQ3c5q_tGdqjHg_uZUBGtro';
const SUPA_ON  = !!(SUPA_URL && SUPA_KEY);
let onlineScores = null;         // null | 'loading' | 'error' | [{name,score},...]
function supaHeaders(){ return { 'apikey':SUPA_KEY, 'Authorization':'Bearer '+SUPA_KEY, 'Content-Type':'application/json' }; }
function fetchWithTimeout(url, opts, ms){
  const ctl = new AbortController(), to = setTimeout(()=>ctl.abort(), ms||6000);
  return fetch(url, Object.assign({}, opts, { signal: ctl.signal })).finally(()=>clearTimeout(to));
}
function fetchBoard(){
  if (!SUPA_ON){ onlineScores='error'; return; }
  onlineScores = 'loading';
  fetchWithTimeout(SUPA_URL+'/rest/v1/scores?select=name,score&order=score.desc&limit=20', { headers: supaHeaders() })
    .then(r => r.ok ? r.json() : Promise.reject(r.status))
    .then(rows => { onlineScores = Array.isArray(rows) ? rows : []; })
    .catch(() => { onlineScores = 'error'; });
}
function submitScore(name, score){
  if (!SUPA_ON || !(score > 0)) return Promise.resolve();
  return fetchWithTimeout(SUPA_URL+'/rest/v1/scores', { method:'POST',
      headers: Object.assign(supaHeaders(), { 'Prefer':'return=minimal' }),
      body: JSON.stringify({ name: String(name||'YOU').slice(0,12), score }) }, 6000)
    .then(()=>{}).catch(()=>{});
}
// Your world rank = (number of scores higher than yours) + 1.
function fetchRank(score){
  game.rank = 'loading';
  if (!SUPA_ON || !(score > 0)){ game.rank = null; return; }
  fetchWithTimeout(SUPA_URL+'/rest/v1/scores?select=id&score=gt.'+score+'&limit=1',
      { headers: Object.assign(supaHeaders(), { 'Prefer':'count=exact' }) }, 6000)
    .then(r => { const cr = r.headers.get('content-range') || ''; const total = parseInt(cr.split('/')[1], 10); game.rank = isNaN(total) ? null : total + 1; })
    .catch(() => { game.rank = null; });
}

/* ---------- Saved progress (resume at the level you reached) ---------- */
function saveProgress(){ try { localStorage.setItem('sausageSave', JSON.stringify({ level:game.level, score:game.score, lives:game.lives, coins:game.coins, seed:runSeed })); } catch(_){} }
function loadProgress(){ try { return JSON.parse(localStorage.getItem('sausageSave') || 'null'); } catch(_){ return null; } }
function clearProgress(){ try { localStorage.removeItem('sausageSave'); } catch(_){} }
function hasSave(){ const s = loadProgress(); return s && s.level > 1; }

/* ---------- Local high-scores table (top 10 on this device) ---------- */
function getScores(){ try { return JSON.parse(localStorage.getItem('sausageScores')||'[]'); } catch(_){ return []; } }
function setScores(a){ try { localStorage.setItem('sausageScores', JSON.stringify(a)); } catch(_){} }
function getName(){ return localStorage.getItem('sausageName') || ''; }
// Score is recorded automatically under the stored nickname — no prompt needed.
function recordGameOver(){
  game.newIdx = -1;
  if (game.score <= 0) return;
  const scores = getScores();
  if (scores.length >= 10 && game.score <= scores[scores.length-1].score) return;
  const n = getName() || 'YOU';
  scores.push({ name:n, score:game.score });
  scores.sort((a,b)=>b.score-a.score);
  const top = scores.slice(0,10);
  game.newIdx = top.findIndex(s=>s.name===n && s.score===game.score);
  setScores(top);
}
// The nickname popup — shown once on first launch, or when you tap to change it.
function openNick(){ const ov=document.getElementById('nameov'), inp=document.getElementById('nameinput'); inp.value=getName(); ov.style.display='flex'; setTimeout(()=>inp.focus(),60); }
function commitName(){
  const inp=document.getElementById('nameinput');
  const n=(inp.value||'PLAYER').toUpperCase().replace(/[^A-Z0-9 ]/g,'').trim().slice(0,10) || 'PLAYER';
  try{ localStorage.setItem('sausageName', n); }catch(_){}
  document.getElementById('nameov').style.display='none';
}

/* ============================================================================
   INPUT  —  tap a treetop to grab; second finger climbs; shake pumps.
   ========================================================================== */
const pointers = new Map();     // pointerId -> {x,y} world pos at press
let grappleId = null;           // finger currently holding the rope
let motionAsked = false;
// Boss on-screen D-pad.
const pointerBtn = new Map();   // pointerId -> 'left'|'right'|'jump'
const bossBtn = { left:false, right:false };
function toScreen(cx, cy){ return { x:(cx-offX)/scale, y:(cy-offY)/scale }; }  // virtual, no camera
// Button hit-boxes (virtual coords), only used during the boss fight.
const BTN = {
  left:  { x:66,     y:VH-92, r:50 },
  right: { x:180,    y:VH-92, r:50 },
  jump:  { x:VW-74,  y:VH-92, r:58 },
};
function inBtn(p, b){ return Math.hypot(p.x-b.x, p.y-b.y) <= b.r; }

function onDown(e){
  e.preventDefault();
  pointers.set(e.pointerId, toWorld(e.clientX, e.clientY));
  startAudio(); requestMotion();
  if (game.paused){ game.paused = false; return; }   // any tap resumes
  // Mute toggle (menu + play).
  if (game.state === S.MENU || game.state === S.PLAY){
    const v = toScreen(e.clientX, e.clientY);
    if (Math.hypot(v.x-MUTEBTN.x, v.y-MUTEBTN.y) <= MUTEBTN.r){ toggleMusic(); return; }
  }
  if (game.state === S.MENU){ if (game.viewBoard){ game.viewBoard=false; return; } menuTap(e.clientX, e.clientY); return; }
  if (game.state === S.OVER){ startRun(); return; }
  if (game.state === S.BOSS){ bossPress(e.pointerId, e.clientX, e.clientY); return; }
  if (game.state !== S.PLAY) return;

  // In-play "view leaderboard" button (pauses the game).
  { const v = toScreen(e.clientX, e.clientY); if (Math.hypot(v.x-LBBTN.x, v.y-LBBTN.y) <= LBBTN.r){ game.paused = true; fetchBoard(); return; } }

  const p = player;
  if (p.mode === 'swing'){ pump(); return; }   // tap while swinging = pump higher (hold a 2nd finger to climb)
  const w = toWorld(e.clientX, e.clientY);
  const a = findAnchorAt(w.x, w.y);
  if (a){
    if (a.live && p.invuln <= 0){ zapDeath(a); }    // City: a LIVE cable zaps you
    else { attach(a); grappleId = e.pointerId; blip(660, 0.05); }
  }
  else { blip(200, 0.03); }
}
// Grab a live (yellow-zapping) City cable — bzzt, you lose a life.
function zapDeath(a){
  game.shake = 16; blip(1300, 0.05, 'sawtooth'); blip(170, 0.22, 'sawtooth');
  for (let i=0;i<16;i++) spawnSpark(a.x, a.y + Math.random()*30, '#fff36b');
  spawnText(a.x, a.y-14, 'ZAP!', '#fff36b');
  loseLife('zap');
}
function onUp(e){
  e.preventDefault();
  pointers.delete(e.pointerId);
  if (pointerBtn.has(e.pointerId)){ pointerBtn.delete(e.pointerId); recomputeBtns(); }
  if (e.pointerId === grappleId){
    if (player && player.mode === 'swing') detach();
    grappleId = null;
  }
}
function recomputeBtns(){ bossBtn.left = bossBtn.right = false; for (const v of pointerBtn.values()){ if (v==='left') bossBtn.left=true; if (v==='right') bossBtn.right=true; } }
function bossPress(id, cx, cy){
  const v = toScreen(cx, cy);
  if (inBtn(v, BTN.jump)){ bossJump(); }        // edge-triggered jump
  else if (inBtn(v, BTN.left)){ pointerBtn.set(id,'left'); bossBtn.left=true; }
  else if (inBtn(v, BTN.right)){ pointerBtn.set(id,'right'); bossBtn.right=true; }
  else if (player.mode !== 'swing'){            // tap a vine to swing in
    const a = findAnchorAt(v.x, v.y);
    if (a){ attach(a); grappleId = id; blip(660,0.05); }
  }
}
function bossJump(){ if (player.onGround){ player.vy = -JUMP_V; player.onGround=false; player.mode='fly'; blip(500,0.05); } }
function menuTap(cx, cy){
  const v = toScreen(cx, cy);
  // Reset-everything button (top-right): starts a fresh run in Zone 1. Keeps your
  // gold and leaderboard. Needs a second confirming tap.
  if (Math.abs(v.x-RESETBTN.x) < RESETBTN.w/2 && Math.abs(v.y-RESETBTN.y) < RESETBTN.h/2){
    if (game.resetArm > 0){ game.resetArm = 0; clearProgress(); startRun(); }
    else { game.resetArm = 150; blip(300,0.05); }
    return;
  }
  if (v.y > VH*0.27 && v.y < VH*0.44 && Math.abs(v.x-VW/2) < 95){ eggTap(); return; }                    // secret: tap the sausage
  if (v.y > VH*0.95-18 && v.y < VH*0.95+14 && Math.abs(v.x-VW/2) < 160){ openNick(); return; }          // nickname
  if (v.y > VH*0.895-20 && v.y < VH*0.895+20 && Math.abs(v.x-VW/2) < 105){ game.viewBoard=true; fetchBoard(); return; }  // leaderboard
  if (hasSave() && v.y > VH*0.835-20 && v.y < VH*0.835+20 && Math.abs(v.x-VW/2) < 95){ clearProgress(); startRun(); return; }  // new game
  if (hasSave()) continueRun(); else startRun();
}
cvs.addEventListener('pointerdown', onDown, {passive:false});
cvs.addEventListener('pointerup', onUp, {passive:false});
cvs.addEventListener('pointercancel', onUp, {passive:false});
window.addEventListener('touchmove', e => e.preventDefault(), {passive:false});

// Desktop helpers: Space grabs the nearest treetop / jumps in the boss; ← → walk
// in the boss; Up climbs; P pumps.
window.addEventListener('keydown', e => {
  if (e.repeat) return;
  if (e.code === 'Space' || e.code === 'ArrowUp'){
    startAudio();
    if (game.state === S.MENU){ e.preventDefault(); hasSave() ? continueRun() : startRun(); return; }
    if (game.state === S.OVER){ e.preventDefault(); startRun(); return; }
    if (game.state === S.BOSS){ e.preventDefault(); bossJump(); return; }
    if (e.code === 'Space' && player && player.mode !== 'swing'){
      e.preventDefault(); const a = findNearestReachable(); if (a){ if (a.live && player.invuln<=0){ zapDeath(a); } else { attach(a); grappleId = 'kbd'; } }
    }
  }
  if (game.state === S.BOSS){ if (e.code==='ArrowLeft') bossBtn.left=true; if (e.code==='ArrowRight') bossBtn.right=true; }
  if (e.code === 'KeyP') pump();
});
window.addEventListener('keyup', e => {
  if (e.code === 'Space' && grappleId === 'kbd'){ if (player && player.mode === 'swing') detach(); grappleId = null; }
  if (e.code === 'ArrowLeft') bossBtn.left=false;
  if (e.code === 'ArrowRight') bossBtn.right=false;
});
const keysDown = new Set();
window.addEventListener('keydown', e => keysDown.add(e.code));
window.addEventListener('keyup',   e => keysDown.delete(e.code));

/* ---------- Motion (shake) ---------- */
let lastAccel = 0, shakeCd = 0;
function requestMotion(){
  if (motionAsked) return; motionAsked = true;
  try {
    if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function'){
      DeviceMotionEvent.requestPermission().then(s => { if (s === 'granted') window.addEventListener('devicemotion', onMotion); }).catch(()=>{});
    } else if (typeof DeviceMotionEvent !== 'undefined'){
      window.addEventListener('devicemotion', onMotion);
    }
  } catch(_) {}
}
function onMotion(e){
  const a = e.accelerationIncludingGravity || e.acceleration; if (!a) return;
  const mag = Math.hypot(a.x||0, a.y||0, a.z||0);
  const delta = Math.abs(mag - lastAccel); lastAccel = mag;
  if (delta > SHAKE_THRESH && shakeCd <= 0){ pump(); shakeCd = 6; }
}
function pump(){
  const p = player; if (!p || p.mode !== 'swing') return;
  const dx = p.x - p.ax, dy = p.y - p.ay, d = Math.hypot(dx, dy) || 1;
  const tx = -dy / d, ty = dx / d;                     // tangent
  const dir = (p.vx * tx + p.vy * ty) >= 0 ? 1 : -1;   // current swing direction
  p.vx += tx * dir * SHAKE_BOOST; p.vy += ty * dir * SHAKE_BOOST;
  clampV(p); game.shake = Math.max(game.shake, 5);
  spawnSpark(p.x, p.y, '#fff2a8'); blip(520, 0.04);
}

/* ---------- Tiny WebAudio blips ---------- */
let actx = null;
function startAudio(){ if (!actx){ try { actx = new (window.AudioContext||window.webkitAudioContext)(); } catch(_){} } if (actx && actx.state === 'suspended') actx.resume(); startMusicLoop(); }
function blip(freq, dur, type){
  if (!actx) return;
  try {
    const o = actx.createOscillator(), g = actx.createGain();
    o.type = type || 'square'; o.frequency.value = freq;
    g.gain.value = 0.05; o.connect(g); g.connect(actx.destination);
    const now = actx.currentTime; o.start(now);
    g.gain.setValueAtTime(0.05, now); g.gain.exponentialRampToValueAtTime(0.0001, now + dur);
    o.stop(now + dur);
  } catch(_){}
}

/* ---------- Background music (procedural chiptune loop) ---------- */
let musicOn = localStorage.getItem('sausageMusic') !== 'off';
let musicTimer = null, musicStep = 0;
function musicNote(freq, dur, type, vol){
  if (!actx || !freq) return;
  try {
    const o = actx.createOscillator(), g = actx.createGain();
    o.type = type; o.frequency.value = freq;
    const now = actx.currentTime;
    g.gain.setValueAtTime(0.0001, now); g.gain.exponentialRampToValueAtTime(vol, now+0.02); g.gain.exponentialRampToValueAtTime(0.0001, now+dur);
    o.connect(g); g.connect(actx.destination); o.start(now); o.stop(now+dur+0.03);
  } catch(_){}
}
const NT = { C3:130.81,E3:164.81,F3:174.61,G3:196.0,A3:220.0,
             C4:261.63,D4:293.66,E4:329.63,F4:349.23,G4:392.0,A4:440.0,B4:493.88,C5:523.25,D5:587.33,E5:659.25 };
// 32-step jaunty melody + 16-step bass (0 = rest).
const MEL  = [NT.C5,0,NT.G4,NT.E4, NT.G4,0,NT.A4,0, NT.C5,0,NT.G4,NT.E4, NT.D4,0,0,0,
              NT.B4,0,NT.G4,NT.D4, NT.G4,0,NT.A4,NT.B4, NT.C5,NT.B4,NT.A4,NT.G4, NT.E4,0,0,0];
const BASS = [NT.C3,0,NT.C3,0, NT.F3,0,NT.F3,0, NT.G3,0,NT.G3,0, NT.C3,0,NT.G3,0];
const BOSSMEL = [NT.E3,0,NT.E3,NT.F3, NT.G3,0,NT.F3,NT.E3, NT.A3,0,NT.G3,NT.F3, NT.E3,0,0,0]; // darker for boss
// City theme — a cooler, syncopated synth-pop riff.
const CITYMEL = [NT.A4,0,NT.E4,0, NT.A4,NT.B4,NT.C5,0, NT.D5,0,NT.C5,NT.A4, NT.B4,0,NT.G4,0,
                 NT.E4,0,NT.A4,0, NT.C5,0,NT.B4,NT.A4, NT.G4,NT.A4,NT.B4,0, NT.A4,0,0,0];
const CITYBASS = [NT.A3,0,NT.A3,0, NT.F3,0,NT.F3,0, NT.C4,0,NT.C4,0, NT.E3,0,NT.E3,0];
function musicTick(){
  const playing = musicOn && (game.state===S.PLAY || game.state===S.BOSS);
  const city = level && level.zone === 1;
  if (playing){
    if (game.state===S.BOSS){
      const m = BOSSMEL[musicStep % BOSSMEL.length]; if (m) musicNote(m, 0.18, city?'square':'sawtooth', 0.03);
      const bass = city ? CITYBASS : BASS; if (musicStep % 2 === 0) musicNote(bass[musicStep % bass.length]||NT.C3, 0.2, 'triangle', 0.04);
    } else if (city){
      const m = CITYMEL[musicStep % CITYMEL.length]; if (m) musicNote(m, 0.14, 'sawtooth', 0.02);
      const bn = CITYBASS[musicStep % CITYBASS.length]; if (bn) musicNote(bn, 0.18, 'triangle', 0.03);
    } else {
      const m = MEL[musicStep % MEL.length]; if (m) musicNote(m, 0.15, 'square', 0.024);
      const bn = BASS[musicStep % BASS.length]; if (bn) musicNote(bn, 0.2, 'triangle', 0.032);
    }
  }
  musicStep++;
}
function startMusicLoop(){ if (musicTimer || !actx) return; musicTimer = setInterval(musicTick, 165); }
function toggleMusic(){ musicOn = !musicOn; try { localStorage.setItem('sausageMusic', musicOn?'on':'off'); } catch(_){} blip(musicOn?660:300, 0.06); }

/* ============================================================================
   ZONES  —  every 10 levels is a new themed world. Difficulty "resets" each
   zone (level 1 of a zone is easy again) but is nudged up a touch from the last
   zone, so zone-2 level 5 is a bit harder than zone-1 level 5, but easier than
   zone-1 level 6.
   ========================================================================== */
const ZONE_NAMES = ['Jungle', 'City', 'Mineshaft'];
function zoneOf(n){ return n < 10 ? 0 : n < 20 ? 1 : 2; }
function zoneLevel(n){ const z = zoneOf(n); return n - (z===0 ? 0 : z===1 ? 9 : 19); }  // 1..10
function diffOf(n){ return zoneLevel(n) + zoneOf(n)*0.5; }   // effective difficulty

/* ============================================================================
   LEVEL GENERATION
   ========================================================================== */
function genLevel(n){
  // Seed mixes this run's random seed with the level number, so the same level
  // number looks different every new game — but stays identical when you retry
  // it after a death within the same run.
  const rng = mulberry32((runSeed ^ Math.imul(n, 2654435761)) >>> 0);
  const zone = zoneOf(n);
  const zl = zoneLevel(n);                        // 1..10 within this zone (gates features)
  const d = diffOf(n);                            // difficulty scales by zone-level (with a nudge each zone)
  const spacing = 205 + Math.min(d * 7, 120);
  const bandLo  = 280, bandHi = 400 + Math.min(d * 8, 120);
  const startX  = CLIFF_W;
  let x = startX + 130;
  const A = [], T = [];
  const wantLen = 1500 + Math.min(d * 240, 5200);
  // Each level picks a height "shape": a wave the treetops follow, so some
  // levels climb, some dip, some zig-zag — and it's different every run.
  const mid = (bandLo + bandHi) / 2, amp = (bandHi - bandLo) / 2;
  const freq = 0.4 + rng() * 1.3, phase = rng() * 6.28, drift = (rng() - 0.5) * 26;
  let i = 0, prevY = mid, prevLive = false;
  while (x < wantLen){
    let y = mid + Math.sin(phase + i*freq) * amp * (0.55 + rng()*0.45) + drift*i + (rng()-0.5)*36;
    y = clamp(y, bandLo - 10, bandHi + 30);
    y = clamp(y, prevY - 150, prevY + 150);      // keep the next vine reachable
    prevY = y;
    // Some vines/cables drift side-to-side (moving vines) from zone-level 6.
    const moving = d >= 6 && i > 0 && rng() < Math.min(0.14 + (d-6)*0.03, 0.5);
    // In the City, some cables are LIVE (yellow zap) — grabbing one zaps you.
    // Never two live in a row, never the first, so there's always a safe route.
    const live = zone === 1 && i > 0 && !prevLive && rng() < 0.30;
    prevLive = live;
    const a = { x, y, baseX:x, mv: moving ? (26 + rng()*34) : 0, mph: rng()*6.28, mvs: 0.012 + rng()*0.016, live, zap: rng()*6.28 };
    A.push(a);
    T.push({ x, top: y, anchor:a, sway: rng() * 6.28, w: 16 + rng()*8,
             coconut: zone===0 && rng() < 0.4 && d >= 2, cd: 60 + rng()*120 });
    x += spacing * (0.82 + rng() * 0.5);          // varied gap rhythm
    i++;
  }
  const lastA = A[A.length - 1] || { x: startX + 200 };
  const endCliffX = Math.min(lastA.x + spacing * 0.9, wantLen + 260);
  const levelLen = endCliffX + CLIFF_W;

  // Monkeys — jungle monkeys, or slingshot kids in the City (see drawMonkey).
  const M = [];
  let mc = Math.min(Math.max(0, Math.round((d - 1) * 0.85)), Math.max(0, A.length - 3), 9);
  const idx = []; for (let i = 1; i < A.length - 1; i++) idx.push(i);
  for (let i = idx.length - 1; i > 0; i--){ const j = (rng()*(i+1))|0; [idx[i],idx[j]]=[idx[j],idx[i]]; }
  for (let i = 0; i < mc; i++){ const a = A[idx[i]]; if (!a) break;
    M.push({ x:a.x, y:a.y-6, alive:true, cd:40+rng()*60, rate:Math.max(60,150-d*6), speed:6.2+Math.min(d*0.22,5), face:rng() }); }

  // Mini-sausages (coins) along the swing path.
  const C = [];
  const coinCount = 3 + Math.min(Math.round(d), 7);
  for (let i = 0; i < coinCount; i++){
    const t = (i + 0.5) / coinCount;
    const ax = startX + 160 + t * (endCliffX - startX - 300);
    const ay = bandLo + 120 + rng() * 180;
    C.push({ x: ax + (rng()-0.5)*60, y: ay, got:false, bob: rng()*6.28 });
  }

  // Gold coins (stamped with a sausage) — rarer than mini-sausages, banked
  // permanently across every zone to spend in the costume shop.
  const GC = [];
  const goldCount = rng() < 0.55 ? 1 : (rng() < 0.5 ? 2 : 0);
  for (let i = 0; i < goldCount; i++){
    const t = (i + 0.5) / (goldCount + 0.2);
    const gx = startX + 220 + t * (endCliffX - startX - 380);
    GC.push({ x: gx + (rng()-0.5)*50, y: bandLo + 70 + rng()*210, got:false, bob: rng()*6.28 });
  }

  // Birds (moving hazard), from zone-level 2.
  const B = [];
  const birdCount = zl >= 2 ? Math.min(Math.floor(d/2), 5) : 0;
  for (let i = 0; i < birdCount; i++){
    const bx = startX + 200 + rng() * (endCliffX - startX - 300);
    B.push({ x:bx, y:160 + rng()*180, baseY:0, amp:20+rng()*30, ph:rng()*6.28,
             vx:(rng()<0.5?-1:1)*(1.1+Math.min(d*0.12,2)), flap:rng()*6.28 });
    B[B.length-1].baseY = B[B.length-1].y;
  }

  // Obstacles you must clear — spiky blocks in the Jungle, apartment blocks that
  // rise into the swing path in the City (swing OVER their rooftops).
  const SP = [];
  const spikeCount = zl >= 2 ? Math.min(Math.floor(d/2)+1, 6) : 0;
  for (let i = 0; i < spikeCount; i++){
    const t = (i + 0.7) / (spikeCount + 0.4);
    let sx = startX + 220 + t * (endCliffX - startX - 360);
    // nudge away from any treetop so an obstacle never sits on a grab point
    for (const a of A){ if (Math.abs(a.x - sx) < 70){ sx += 90; } }
    if (zone === 1){
      // City: an apartment block rising from below — swing over the roof.
      SP.push({ x:sx, baseX:sx, y: CLIFF_TOP - 30 - rng()*160, baseY:0, ph:0,
                amp:0, vx:0, building:true, hw: 24 + rng()*12, seed: rng() });
      SP[SP.length-1].baseY = SP[SP.length-1].y;
    } else {
      // Jungle: a spiky block down in the swing path; some bob, some patrol.
      const moves = rng() < 0.5;
      SP.push({ x:sx, baseX:sx, y:360 + rng()*210, baseY:0, ph:rng()*6.28,
                amp: moves?0:(16+rng()*22),
                vx: moves?((rng()<0.5?-1:1)*(0.7+rng()*0.9)):0 });
      SP[SP.length-1].baseY = SP[SP.length-1].y;
    }
  }

  // Bees — a Jungle-only hazard from zone-level 4 that slowly chases you (dodge
  // by swinging away). Adds variety beyond the static/patrolling obstacles.
  const BE = [];
  const beeCount = (zone === 0 && zl >= 4) ? Math.min(Math.floor((d-2)/2), 4) : 0;
  for (let i = 0; i < beeCount; i++){
    const bx = startX + 300 + rng() * (endCliffX - startX - 420);
    BE.push({ x:bx, y:240 + rng()*180, vx:0, vy:0, wing:rng()*6.28, spd:0.9 + Math.min(d*0.05, 0.9) });
  }

  // Invincibility banana — a golden banana that makes you invincible for a few
  // seconds. Handy when you're stuck. About one per level, on the swing path.
  const PW = [];
  if (A.length > 3){
    const ai = 2 + ((rng() * (A.length - 3)) | 0);
    const a = A[Math.min(ai, A.length - 2)];
    PW.push({ x:a.x + (rng()-0.5)*40, y:a.y + 95 + rng()*70, got:false, bob:rng()*6.28 });
  }

  // From difficulty 8, gusty wind nudges you in the air (drifts your flight).
  const wind = d >= 8 ? (0.05 + Math.min((d-8)*0.006, 0.06)) : 0;

  const isBoss = (n % 3 === 0);
  // Frying pan on boss levels (you need it for the gorilla).
  let P = null;
  if (isBoss && A.length > 2){
    const a = A[(A.length/2)|0];
    P = { x:a.x + spacing*0.4, y:a.y + 120, got:false, bob:0 };
  }
  return { n, zone, zl, len:levelLen, endCliffX, anchors:A, trees:T, monkeys:M, coins:C, goldcoins:GC, birds:B, spikes:SP, bees:BE, powerups:PW, wind, pan:P, boss:isBoss, bossDone:false };
}

/* ============================================================================
   LIFECYCLE
   ========================================================================== */
function startRun(){ clearProgress(); document.getElementById('nameov').style.display='none'; game.newIdx=-1; game.rank=null; game.viewBoard=false; runSeed = (Math.random()*0xFFFFFFFF)>>>0; game.level = 1; game.lives = START_LIVES; game.score = 0; game.coins = 0; loadLevel(1); }
function continueRun(){ const s = loadProgress(); if (!s){ startRun(); return; } runSeed = (s.seed>>>0) || runSeed; game.level = s.level; game.score = s.score; game.lives = s.lives; game.coins = s.coins; loadLevel(s.level); }

function loadLevel(n){
  game.level = n;
  level   = genLevel(n);
  anchors = level.anchors; trees = level.trees; monkeys = level.monkeys;
  coins   = level.coins;   goldcoins = level.goldcoins; birds = level.birds; pan = level.pan; spikes = level.spikes; bees = level.bees; powerups = level.powerups;
  bananas = []; particles = []; coconuts = []; floatTexts = []; boss = null;
  clouds = clouds || makeClouds();
  game.armed = false; game.camX = 0; game.state = S.PLAY; game.timer = 0; game.panMsg = 0;
  game.arena = false; game.hint = n === 1 ? 260 : 0; game.paused = false; game.bossHP = 0;
  grappleId = null; pointers.clear(); pointerBtn.clear(); recomputeBtns();
  player = { x:CLIFF_W-40, y:CLIFF_TOP-STAND_DY, vx:0, vy:0, mode:'stand',
             ax:0, ay:0, L:0, curA:null, iframe:0, invuln:0, face:'happy', legPh:0, r:15, onGround:true };
  saveProgress();            // checkpoint at the start of every level
}
function retryLevel(){ loadLevel(game.level); }
function nextLevel(){
  game.score++;
  if (game.score > game.best){ game.best = game.score; localStorage.setItem('sausageBest', game.best); }
  game.level++; loadLevel(game.level);
}
function loseLife(reason){
  if (game.state !== S.PLAY && game.state !== S.BOSS) return;
  if (player.invuln > 0) return;   // truly invincible: shrug off EVERYTHING, including falls
  game.diedInBoss = (game.state === S.BOSS);   // a boss hit re-fights only the boss
  game.lives--; game.shake = 16;
  spawnSplat(player.x, player.y, reason==='zap'?'#fff36b':reason==='banana'?'#ffd23f':'#c86b3a');
  blip(140, 0.25, 'sawtooth');
  if (game.lives <= 0){
    game.state = S.OVER; game.timer = 0; clearProgress();
    if (game.score > game.best){ game.best = game.score; localStorage.setItem('sausageBest', game.best); }
    recordGameOver();                                   // local table
    submitScore(getName(), game.score).then(()=>{ fetchBoard(); fetchRank(game.score); }); // online + rank
  } else { game.state = S.DYING; game.timer = 40; }
}

/* ---------- Grapple ---------- */
function findAnchorAt(tx, ty){   // aimed: nearest treetop to the tap, and reachable
  let best = null, bd = Infinity;
  for (const a of anchors){
    if (Math.hypot(a.x - tx, a.y - ty) > TAP_TOL) continue;
    if (Math.hypot(a.x - player.x, a.y - player.y) > GRAPPLE) continue;
    if (a.y > player.y + 90) continue;
    const d = Math.hypot(a.x - tx, a.y - ty);
    if (d < bd){ bd = d; best = a; }
  }
  return best;
}
function findNearestReachable(){   // desktop Space fallback
  let best = null, bs = Infinity;
  for (const a of anchors){
    const d = Math.hypot(a.x-player.x, a.y-player.y);
    if (d > GRAPPLE || a.y > player.y + 90) continue;
    let s = d + (a.x < player.x - 20 ? 300 : 0);
    if (s < bs){ bs = s; best = a; }
  }
  return best;
}
function attach(a){
  player.curA = a; player.ax = a.x; player.ay = a.y;
  player.L = Math.max(CLIMB_MIN, Math.hypot(a.x-player.x, a.y-player.y));
  if (player.mode === 'stand'){ player.vx = Math.sign(a.x-player.x)*2.2 || 2.2; player.vy = -1; }
  player.mode = 'swing';
}
function detach(){
  player.mode = 'fly';
  player.vx *= RELEASE_KICK; player.vy = player.vy*RELEASE_KICK - 0.4;
  clampV(player); blip(440, 0.05);
}
function clampV(p){ const s = Math.hypot(p.vx,p.vy); if (s > MAXV){ p.vx=p.vx/s*MAXV; p.vy=p.vy/s*MAXV; } }
function clamp(v,a,b){ return v<a?a:v>b?b:v; }

/* ---------- Swing/fly physics for one body against a floor ---------- */
function integrate(p, opts){
  const climbing = p.mode === 'swing' && ([...pointers.keys()].some(k => k !== grappleId) || keysDown.has('ArrowUp'));
  if (p.mode === 'swing'){
    if (p.curA){ p.ax = p.curA.x; p.ay = p.curA.y; }   // follow a moving vine's pivot
    if (climbing){ p.L = Math.max(CLIMB_MIN, p.L - CLIMB_SPEED); if (game.t % 6 === 0) blip(720,0.02); }
    p.vy += G; p.x += p.vx; p.y += p.vy;
    let dx=p.x-p.ax, dy=p.y-p.ay, d=Math.hypot(dx,dy)||1;
    const diff=(d-p.L)/d; p.x-=dx*diff; p.y-=dy*diff;
    dx=p.x-p.ax; dy=p.y-p.ay; d=Math.hypot(dx,dy)||1;
    const nx=dx/d, ny=dy/d, radial=p.vx*nx+p.vy*ny;
    p.vx-=radial*nx; p.vy-=radial*ny; p.vx*=0.999; clampV(p);
  } else if (p.mode === 'fly'){
    p.vy += G; p.vx *= AIR; p.x += p.vx; p.y += p.vy; clampV(p);
  }
  p.legPh += 0.2;
  if (p.iframe > 0) p.iframe--;
}

/* ============================================================================
   UPDATE (normal levels)
   ========================================================================== */
function step(){
  if (game.paused){ game.t++; return; }   // frozen while viewing the leaderboard
  game.t++;
  if (game.shake > 0.5) game.shake *= 0.86; else game.shake = 0;
  if (game.panMsg > 0) game.panMsg--;
  if (game.hint  > 0) game.hint--;
  if (game.resetArm > 0) game.resetArm--;
  if (shakeCd > 0) shakeCd--;

  if (game.state === S.DYING){ if (--game.timer<=0){ if (game.diedInBoss){ game.diedInBoss=false; enterBoss(); } else retryLevel(); } updateParticles(); return; }
  if (game.state === S.CLEAR){ if (--game.timer<=0) nextLevel(); updateParticles(); return; }
  if (game.state === S.BOSSWIN){ if (--game.timer<=0){ level.bossDone=true; nextLevel(); } updateParticles(); return; }
  if (game.state === S.BOSS){ updateBoss(); return; }
  if (game.state !== S.PLAY){ updateParticles(); updateClouds(); return; }

  const p = player;
  // Moving vines drift side-to-side.
  for (const a of anchors){ if (a.mv) a.x = a.baseX + Math.sin(a.mph + game.t*a.mvs)*a.mv; }
  integrate(p);
  // Gusty wind nudges you through the air.
  if (level.wind && p.mode !== 'stand'){ p.vx += level.wind * Math.sin(game.t*0.006) * (p.mode==='swing'?0.4:1); }
  // Party mode: rainbow trail.
  if (game.party && p.mode !== 'stand' && game.t%2===0){ particles.push({x:p.x,y:p.y,vx:0,vy:0.3,life:16,col:'hsl('+((game.t*9)%360)+',90%,62%)',r:6}); }

  const targetCam = clamp(p.x - VW*0.36, 0, level.len - VW);
  game.camX += (targetCam - game.camX) * 0.12;

  p.face = p.mode==='swing' ? 'happy' : p.mode==='fly' ? (p.vy>6?'worried':'ooh') : 'happy';

  // Pan pickup.
  if (pan && !pan.got){ pan.bob += 0.08;
    if (Math.hypot(pan.x-p.x, pan.y-p.y) < 34){ pan.got=true; game.armed=true; game.panMsg=150; blip(880,0.12); spawnSpark(pan.x,pan.y,'#cfd3d8'); } }

  // Mini-sausages.
  for (const c of coins){ if (c.got) continue; c.bob += 0.1;
    if (Math.hypot(c.x-p.x, c.y-p.y) < 30){ c.got=true; game.coins++; blip(1040,0.06); spawnText(c.x,c.y-10,'+1','#ffd27a'); for(let i=0;i<6;i++) spawnSpark(c.x,c.y,'#e0824a'); } }

  // Gold coins — banked permanently (for the costume shop).
  for (const gc of goldcoins){ if (gc.got) continue; gc.bob += 0.08;
    if (Math.hypot(gc.x-p.x, gc.y-p.y) < 30){ gc.got=true; addGold(1); blip(1320,0.06); blip(1760,0.07); spawnText(gc.x,gc.y-12,'+1 GOLD','#ffd24a'); for(let i=0;i<10;i++) spawnSpark(gc.x,gc.y,'#ffd24a'); } }

  // Invincibility bananas.
  if (p.invuln > 0) p.invuln--;
  for (const g of powerups){ if (g.got) continue; g.bob += 0.09;
    if (Math.hypot(g.x-p.x, g.y-p.y) < 34){ g.got=true; p.invuln = 480; blip(700,0.1); blip(1000,0.12);
      spawnText(g.x, g.y-14, 'INVINCIBLE!', '#ffe27a'); for(let i=0;i<16;i++) spawnSpark(g.x,g.y,'#ffe27a'); } }
  // While invincible you can't fall to your death: if you drop into the ravine
  // you gently float back up so you can grab a vine again.
  if (p.invuln > 0){
    if (p.mode === 'fly' && p.y > CLIFF_TOP){ p.vy -= G*1.5; if (p.vy > 3) p.vy = 3; }
    if (p.y > VH-34){ p.y = VH-34; if (p.vy > 0) p.vy = 0; if (p.mode==='fly') p.vy = -6; }
  }

  // Monkeys throw bananas / get whacked.
  for (const m of monkeys){ if (!m.alive) continue;
    if (game.armed && Math.hypot(m.x-p.x,m.y-p.y) < 30){ m.alive=false; game.shake=12; blip(300,0.08,'square'); spawnSplat(m.x,m.y,'#8b5a2b'); spawnText(m.x,m.y,'WHACK!','#fff'); continue; }
    const onScreen = m.x > game.camX-40 && m.x < game.camX+VW+40;
    if (onScreen && Math.abs(m.x-p.x) < VW*0.7){ if (--m.cd<=0){ m.cd = m.rate*(0.7+Math.random()*0.6); throwBanana(m,p); } }
  }
  // Bananas.
  for (const b of bananas){ b.vy += G*0.55; b.x+=b.vx; b.y+=b.vy; b.spin+=0.3;
    if (p.iframe<=0 && Math.hypot(b.x-p.x,b.y-p.y) < p.r+12){ b.dead=true; loseLife('banana'); }
    if (b.y>VH+60 || b.x<game.camX-80) b.dead=true; }
  bananas = bananas.filter(b=>!b.dead);

  // Coconuts drop from coconut-trees as the player passes.
  for (const t of trees){ if (!t.coconut) continue;
    if (Math.abs(t.x - p.x) < 120 && p.x < t.x + 40){ if ((t.cd-=1) <= 0){ t.cd = 150 + Math.random()*120; coconuts.push({ x:t.x, y:t.top+30, vy:0 }); } } }
  for (const c of coconuts){ c.vy += G*0.34; if (c.vy > 5) c.vy = 5; c.y += c.vy;   // gentler fall
    if (p.iframe<=0 && Math.hypot(c.x-p.x,c.y-p.y) < p.r+13){ c.dead=true; loseLife('coconut'); }
    if (c.y > VH+60) c.dead=true; }
  coconuts = coconuts.filter(c=>!c.dead);

  // Birds patrol; collision hurts.
  for (const bd of birds){ bd.x += bd.vx; bd.flap += 0.3; bd.y = bd.baseY + Math.sin(bd.ph + game.t*0.03)*bd.amp;
    if (bd.x < CLIFF_W-40 || bd.x > level.endCliffX+40) bd.vx *= -1;
    if (p.iframe<=0 && Math.hypot(bd.x-p.x,bd.y-p.y) < p.r+14){ p.iframe=1; loseLife('bird'); } }

  // Obstacles. City apartment blocks are solid from their rooftop down (swing
  // over them); jungle spiky blocks bob/patrol in the swing path.
  for (const s of spikes){
    if (s.building){
      if (p.iframe<=0 && Math.abs(s.x-p.x) < s.hw+p.r && p.y > s.y - p.r){ p.iframe=1; loseLife('spike'); }
      continue;
    }
    if (s.amp) s.y = s.baseY + Math.sin(s.ph + game.t*0.02)*s.amp;
    if (s.vx){ s.x += s.vx; if (Math.abs(s.x - s.baseX) > 85) s.vx *= -1; }
    if (p.iframe<=0 && Math.abs(s.x-p.x) < p.r+18 && Math.abs(s.y-p.y) < p.r+18){ p.iframe=1; loseLife('spike'); } }

  // Bees slowly home in on the player; swing away to shake them.
  for (const bee of bees){ bee.wing += 0.4;
    const onScreen = bee.x > game.camX-60 && bee.x < game.camX+VW+60;
    if (onScreen){
      const dx=p.x-bee.x, dy=p.y-bee.y, d=Math.hypot(dx,dy)||1;
      bee.vx += dx/d*0.05; bee.vy += dy/d*0.05;
      const sp=Math.hypot(bee.vx,bee.vy); if (sp>bee.spd){ bee.vx=bee.vx/sp*bee.spd; bee.vy=bee.vy/sp*bee.spd; }
      bee.x += bee.vx; bee.y += bee.vy;
      if (p.iframe<=0 && Math.hypot(bee.x-p.x,bee.y-p.y) < p.r+12){ p.iframe=1; loseLife('bee'); }
    }
  }

  // Keep the sausage on screen — no vanishing off the top.
  if (p.y < 24 && p.mode !== 'swing'){ p.y = 24; if (p.vy < 0) p.vy = 0; }

  updateParticles(); updateClouds();

  // Crossed the finish line? The WHOLE finish cliff counts — touch it at any
  // height (as long as you haven't fallen into the ravine) and you're through.
  if (p.x >= level.endCliffX && p.y < VH){
    if (level.boss && !level.bossDone){ enterBoss(); return; }
    p.x=level.endCliffX; p.y=CLIFF_TOP-STAND_DY; p.mode='stand'; p.vx=p.vy=0;
    game.state=S.CLEAR; game.timer=55; blip(880,0.1); blip(1120,0.12);
    for (let i=0;i<24;i++) spawnSpark(p.x, p.y-20, '#ffe27a'); return;
  }
  // Safe landing back on the start cliff.
  if (p.x < CLIFF_W && p.mode!=='swing' && p.y >= CLIFF_TOP-STAND_DY && p.vy>=0){ p.y=CLIFF_TOP-STAND_DY; p.vy=0; p.vx*=0.5; p.mode='stand'; }
  if (p.y > VH+80) loseLife('fall');
}

function throwBanana(m, p){
  const dx=(p.x+p.vx*8)-m.x, dy=p.y-m.y, ang=Math.atan2(dy-60,dx);
  bananas.push({ x:m.x, y:m.y-10, vx:Math.cos(ang)*m.speed, vy:Math.sin(ang)*m.speed-2, spin:0, dead:false });
  blip(240,0.04);
}

/* ============================================================================
   GORILLA BOSS  —  arena at the end of every 3rd level.
   Draw in screen coords (camX ignored). Full-width floor, two vines to swing
   on. Whack the gorilla with the pan; helper monkeys (one per mini-sausage)
   pelt it with bananas. Dodge barrels and coconuts.
   ========================================================================== */
const BOSS_FLOOR = CLIFF_TOP;
const BOSS_STAND = BOSS_FLOOR - STAND_DY;   // player's feet-on-floor y
function enterBoss(){
  game.state = S.BOSS; game.arena = true; game.camX = 0; game.timer = 0;
  const tier = level.n / 3;                       // 1,2,3...
  const hp = 5 + (tier-1)*5;                       // scales up steeply each boss
  boss = {
    g: { x:VW-84, y:BOSS_FLOOR, hp, maxhp:hp, tier, iframe:0, cd:110, beatCd:230, anim:0, hurt:0 },
    helpers: [], barrels: [], cocos: [], fban: [], intro: 160,
  };
  const helperN = Math.min(game.coins, HELPER_CAP);
  for (let i=0;i<helperN;i++) boss.helpers.push({ x:22+i*26, y:BOSS_FLOOR, cd:40+i*16, bob:i, gone:false });
  // Swingable vines — the right one is positioned so a good swing carries you
  // into the gorilla. All kept left of it (you can't get behind).
  anchors = [ {x:VW*0.30, y:150}, {x:VW*0.48, y:118}, {x:VW*0.64, y:116}, {x:VW*0.80, y:132} ];
  bananas = []; coconuts = []; particles = []; floatTexts = [];
  game.panUses = game.armed ? 2 : 0;              // pan breaks after 2 whacks
  player.x = 60; player.y = BOSS_STAND; player.vx=0; player.vy=0; player.mode='stand'; player.onGround=true; player.curA=null; player.iframe=60;
  grappleId = null; pointers.clear(); pointerBtn.clear(); recomputeBtns();
  blip(90,0.4,'sawtooth'); game.shake = 18;
}
function updateBoss(){
  if (game.shake>0.5) game.shake*=0.86; else game.shake=0;
  if (game.panMsg>0) game.panMsg--;
  const p = player, b = boss, g = b.g;
  if (b.intro > 0) b.intro--;

  const maxX = g.x - 8;   // can't get behind the gorilla — no safe corner
  // ---- Movement: swing on a vine, or walk/jump with the D-pad ----
  if (p.mode === 'swing'){
    integrate(p);                                // pendulum + two-finger climb
    p.onGround = false; p.face = 'happy';
    if (p.y < 24){ p.y = 24; }
    p.x = clamp(p.x, 16, maxX);
  } else {
    const target = bossBtn.left ? -WALK : bossBtn.right ? WALK : 0;
    // On the ground, walk; in the air keep swing momentum unless steering.
    if (p.onGround || bossBtn.left || bossBtn.right) p.vx += (target - p.vx) * (p.onGround ? 0.35 : 0.10);
    p.vy += BG;
    p.x += p.vx; p.y += p.vy;
    p.onGround = false;
    if (p.y >= BOSS_STAND && p.vy >= 0){ p.y = BOSS_STAND; p.vy = 0; p.onGround = true; }
    if (p.y < 24){ p.y = 24; if (p.vy < 0) p.vy = 0; }   // ceiling — never off the top
    p.x = clamp(p.x, 16, maxX);
    p.mode = p.onGround ? 'stand' : 'fly';
    p.legPh += Math.abs(p.vx) * 0.06 + 0.05;
    p.face = p.onGround ? 'happy' : 'ooh';
    if (p.iframe > 0) p.iframe--;
  }

  if (p.invuln > 0) p.invuln--;
  if (game.party && p.mode !== 'stand' && game.t%2===0){ particles.push({x:p.x,y:p.y,vx:0,vy:0.3,life:16,col:'hsl('+((game.t*9)%360)+',90%,62%)',r:6}); }
  if (g.iframe>0) g.iframe--;
  if (g.hurt>0) g.hurt--;
  g.anim += 0.05;

  if (b.intro <= 0 && g.hp > 0){
    // Damage the gorilla only by SWINGING on a vine and landing on his HEAD
    // (the top). Bumping his body or jumping does nothing — swing so the bottom
    // of your arc comes down on his head. You keep swinging, so a good line
    // bops him each pass while you dodge his attacks.
    if (g.iframe<=0 && p.mode==='swing'){
      const hit = Math.hypot(p.x-g.x, p.y-(g.y-88)) < 52;   // land on the head
      if (hit){
        const withPan = game.armed && game.panUses > 0;
        g.hp -= withPan ? 2 : 1; g.iframe=22; g.hurt=16; game.shake=12; blip(320,0.09,'square');
        spawnText(g.x, g.y-96, withPan?'WHACK! −2':'KICK! −1', '#fff'); for(let i=0;i<12;i++) spawnSpark(g.x,g.y-50,'#ffe27a');
        if (withPan && --game.panUses <= 0){ game.armed=false; spawnText(p.x, p.y-40, 'PAN BROKE!', '#e6b0a0'); blip(120,0.2,'sawtooth'); }
      }
    }
    // Gorilla attacks — faster and heavier the further you get (higher tier).
    const T = g.tier;
    if (--g.cd <= 0){ g.cd = Math.max(55, 150 - T*20 - Math.random()*25); g.anim = 0;
      b.barrels.push({ x:g.x-30, y:BOSS_FLOOR-14, vx:-(2.4 + T*0.5 + Math.random()*1.1), spin:0 }); blip(160,0.1,'sawtooth'); }
    if (--g.beatCd <= 0){ g.beatCd = Math.max(200, 360 - T*30); game.shake=10; blip(120,0.2,'sawtooth');
      const nc = 1 + T; for (let i=0;i<nc;i++) b.cocos.push({ x:40+Math.random()*(VW-80), y:-20-Math.random()*40, vy:0.4 + T*0.25 + Math.random()*0.8 }); }
    // Helper monkeys: each lobs ONE banana at the gorilla then scurries away.
    for (const h of b.helpers){ if (h.gone) continue; h.bob += 0.1;
      if (--h.cd <= 0){ h.gone = true;
        const sx=h.x+8, sy=BOSS_FLOOR-24, tx=g.x, ty=g.y-46, d=Math.hypot(tx-sx,ty-sy)||1;
        b.fban.push({ x:sx, y:sy, vx:(tx-sx)/d*7.5, vy:(ty-sy)/d*7.5, spin:0 }); } }
  }
  // Scurrying helpers run off to the left, then vanish.
  for (const h of b.helpers){ if (h.gone){ h.x -= 3.2; } }
  b.helpers = b.helpers.filter(h => !(h.gone && h.x < -30));

  // Barrels roll along the floor — jump over them (they hit only when your feet
  // are near the ground).
  for (const bar of b.barrels){ bar.x += bar.vx; bar.spin += 0.28;
    const feet = p.y + 55;
    if (p.iframe<=0 && Math.abs(bar.x-p.x) < p.r+15 && feet > BOSS_FLOOR-24){ bar.dead=true; loseLife('barrel'); }
    if (bar.x < -40) bar.dead=true; }
  b.barrels = b.barrels.filter(x=>!x.dead);
  // Falling coconuts — slow and dodgeable.
  for (const c of b.cocos){ c.vy += BG*0.28; if (c.vy > 4.2) c.vy = 4.2; c.y += c.vy;
    if (p.iframe<=0 && Math.hypot(c.x-p.x, c.y-p.y) < p.r+13){ c.dead=true; loseLife('coconut'); }
    if (c.y > VH+40) c.dead=true; }
  b.cocos = b.cocos.filter(c=>!c.dead);
  // Friendly bananas damage the gorilla (fly straight, generous hitbox).
  for (const f of b.fban){ f.x += f.vx; f.y += f.vy; f.spin += 0.3;
    if (g.iframe<=0 && g.hp>0 && Math.hypot(f.x-g.x, f.y-(g.y-46)) < 42){ f.dead=true; g.hp--; g.iframe=8; g.hurt=10; spawnText(g.x,g.y-72,'-1','#ffd27a'); blip(400,0.05); }
    if (f.x > VW+40 || f.x < -40 || f.y > VH+40 || f.y < -40) f.dead=true; }
  b.fban = b.fban.filter(f=>!f.dead);

  updateParticles();
  game.bossHP = Math.max(0, g.hp);   // remember progress across retries

  if (game.state === S.BOSS && g.hp <= 0){
    game.bossHP = 0;
    game.state = S.BOSSWIN; game.timer = 90; game.shake = 20;
    blip(700,0.15); blip(900,0.18); blip(1200,0.25);
    for (let i=0;i<40;i++) spawnSpark(g.x, g.y-40, '#ffe27a');
  }
}

/* ---------- Particles / text ---------- */
function updateParticles(){
  for (const q of particles){ q.vy += 0.3; q.x += q.vx; q.y += q.vy; q.life--; }
  particles = particles.filter(q=>q.life>0);
  for (const f of floatTexts){ f.y += f.vy; f.vy *= 0.94; f.life--; }
  floatTexts = floatTexts.filter(f=>f.life>0);
}
function spawnSplat(x,y,col){ for(let i=0;i<16;i++){ const a=Math.random()*6.28,s=1+Math.random()*5; particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-2,life:30+Math.random()*20,col,r:2+Math.random()*3}); } }
function spawnSpark(x,y,col){ const a=Math.random()*6.28,s=1+Math.random()*3; particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-1,life:24,col,r:2}); }
function spawnText(x,y,txt,col){ floatTexts.push({x,y,vy:-1.6,life:48,txt,col:col||'#fff'}); }

/* ---------- Easter egg: Party Sausage 🎉 (tap the menu sausage 5×) ---------- */
let confetti = [];
function spawnConfetti(){ const cols=['#ff5252','#ffd23f','#57b94f','#4f9fff','#c86bff','#ff9f45'];
  for(let i=0;i<54;i++) confetti.push({x:VW/2+(Math.random()-0.5)*140, y:VH*0.34, vx:(Math.random()-0.5)*9, vy:-4-Math.random()*8, col:cols[i%cols.length], rot:Math.random()*6.28, vr:(Math.random()-0.5)*0.4, life:110+Math.random()*70}); }
function drawConfetti(){
  for(const c of confetti){ c.vy+=0.18; c.x+=c.vx; c.y+=c.vy; c.vx*=0.99; c.rot+=c.vr; c.life--;
    ctx.save(); ctx.translate(c.x,c.y); ctx.rotate(c.rot); ctx.globalAlpha=clamp(c.life/40,0,1); ctx.fillStyle=c.col; ctx.fillRect(-4,-3,8,6); ctx.restore(); }
  ctx.globalAlpha=1; confetti = confetti.filter(c=>c.life>0 && c.y<VH+30);
}
function eggTap(){
  game.eggTaps++; blip(400+Math.min(game.eggTaps,6)*70, 0.05);
  if (game.eggTaps % 5 === 0){
    game.party = !game.party; try { localStorage.setItem('sausageParty', game.party?'on':'off'); } catch(_){}
    spawnConfetti(); game.partyMsg = 130;
  }
}

function makeClouds(){ const c=[]; for(let i=0;i<8;i++) c.push({x:Math.random()*3000,y:40+Math.random()*220,s:0.6+Math.random()*0.9,sp:0.1+Math.random()*0.2}); return c; }
function updateClouds(){ for(const c of clouds){ c.x-=c.sp; if(c.x<-200) c.x+=3400; } }

/* ============================================================================
   RENDER
   ========================================================================== */
function render(){
  ctx.setTransform(dpr,0,0,dpr,0,0);
  const W=cvs.width/dpr, H=cvs.height/dpr;
  const z = level ? level.zone : 0;
  const sky=ctx.createLinearGradient(0,0,0,H);
  if (z===1){ sky.addColorStop(0,'#243a63'); sky.addColorStop(0.62,'#6a5c8e'); sky.addColorStop(1,'#e7a95e'); }   // City dusk
  else { sky.addColorStop(0,'#79c6e8'); sky.addColorStop(0.7,'#bfe9f5'); sky.addColorStop(1,'#e9f8ef'); }        // Jungle day
  ctx.fillStyle=sky; ctx.fillRect(0,0,W,H);

  const sh=game.shake>0.5?game.shake:0, shx=sh?(Math.random()*2-1)*sh:0, shy=sh?(Math.random()*2-1)*sh:0;
  ctx.setTransform(scale*dpr,0,0,scale*dpr,(offX+shx)*dpr,(offY+shy)*dpr);
  ctx.save(); ctx.beginPath(); ctx.rect(0,0,VW,VH); ctx.clip();

  if (game.state === S.BOSS || game.state === S.BOSSWIN){ renderBoss(); }
  else {
    drawParallax();
    ctx.save(); ctx.translate(-game.camX,0); drawWorld(); ctx.restore();
  }
  drawHUD();
  ctx.restore();
  drawOverlays();
}

function drawParallax(){
  if (level && level.zone === 1){ cityParallax(); windStreaks(); return; }
  ctx.fillStyle='rgba(255,244,190,0.9)'; ctx.beginPath(); ctx.arc(VW-70,90,46,0,6.29); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.85)';
  for(const c of clouds){ const x=c.x-game.camX*0.3, xx=((x%(VW+400))+(VW+400))%(VW+400)-200; cloud(xx,c.y,34*c.s); }
  hills(-game.camX*0.4, CLIFF_TOP+40, 0.6, '#8fd08a');
  hills(-game.camX*0.55+140, CLIFF_TOP+68, 0.8, '#79c47a');
  windStreaks();
}
// A repeating skyline of tall buildings with lit windows, two parallax layers.
function skyline(off, baseY, cols, seedShift){
  let x = ((-off % 90)+90)%90 - 90;
  let k = Math.floor(off/90) + seedShift;
  while (x < VW+60){
    const h = 120 + ((k*73)%5)*46 + ((k*29)%3)*24;
    const w = 46 + ((k*17)%3)*14;
    ctx.fillStyle = cols.body;
    ctx.fillRect(x, baseY-h, w, h+40);
    // windows
    ctx.fillStyle = cols.win;
    for (let wy=baseY-h+12; wy<baseY-10; wy+=18){
      for (let wx=x+7; wx<x+w-8; wx+=13){
        if (((k*7 + (wy|0)*3 + (wx|0)) % 5) < 3) ctx.fillRect(wx, wy, 7, 10);
      }
    }
    x += w + 8; k++;
  }
}
function cityParallax(){
  // hazy moon
  ctx.fillStyle='rgba(255,240,210,0.55)'; ctx.beginPath(); ctx.arc(VW-72,86,38,0,6.29); ctx.fill();
  // far skyline (dim, slow) then near skyline (darker, faster)
  skyline(game.camX*0.25, CLIFF_TOP+30, { body:'#3a3f63', win:'rgba(255,225,140,0.5)' }, 0);
  skyline(game.camX*0.5,  CLIFF_TOP+66, { body:'#262a45', win:'rgba(255,220,120,0.75)' }, 11);
}
function windStreaks(){
  // Wind streaks (from level 8) drifting in the current gust direction.
  if (level && level.wind && (game.state===S.PLAY)){
    const dir = Math.sin(game.t*0.006) >= 0 ? 1 : -1;
    ctx.strokeStyle='rgba(255,255,255,0.28)'; ctx.lineWidth=2; ctx.lineCap='round';
    for(let i=0;i<7;i++){
      const yy = 80 + i*70 + (i*33 % 60);
      const base = ((game.t*3*dir + i*140) % (VW+160) + (VW+160)) % (VW+160) - 80;
      ctx.beginPath(); ctx.moveTo(base, yy); ctx.lineTo(base + dir*28, yy); ctx.stroke();
    }
  }
}
function cloud(x,y,r){ ctx.beginPath(); ctx.arc(x,y,r,0,6.29); ctx.arc(x+r,y+6,r*0.8,0,6.29); ctx.arc(x-r,y+6,r*0.8,0,6.29); ctx.arc(x+r*0.4,y-r*0.5,r*0.7,0,6.29); ctx.fill(); }
function hills(off,y,amp,col){ ctx.fillStyle=col; ctx.beginPath(); ctx.moveTo(0,VH);
  for(let x=-100;x<=VW+100;x+=40){ const yy=y+Math.sin((x-off)*0.01)*30*amp+Math.sin((x-off)*0.03)*10*amp; ctx.lineTo(x,yy); }
  ctx.lineTo(VW,VH); ctx.closePath(); ctx.fill(); }

function drawWorld(){
  const rav=ctx.createLinearGradient(0,CLIFF_TOP,0,VH); rav.addColorStop(0,'rgba(40,70,60,0)'); rav.addColorStop(1,'rgba(20,40,35,0.55)');
  ctx.fillStyle=rav; ctx.fillRect(game.camX,CLIFF_TOP,VW,VH-CLIFF_TOP);
  for(const s of spikes) if(s.building) drawBuilding(s);   // city blocks sit behind the cables
  for(const t of trees) drawTree(t);
  for(const c of coins) if(!c.got) drawCoin(c.x, c.y+Math.sin(c.bob)*5);
  for(const gc of goldcoins) if(!gc.got) drawGold(gc.x, gc.y+Math.sin(gc.bob)*5);
  for(const g of powerups) if(!g.got) drawGolden(g.x, g.y+Math.sin(g.bob)*6);
  if(pan && !pan.got) drawPan(pan.x, pan.y+Math.sin(pan.bob)*6);
  drawCliff(0,CLIFF_W,true); drawCliff(level.endCliffX,CLIFF_W,false); drawFinishLine(level.endCliffX);
  for(const m of monkeys) if(m.alive) drawMonkey(m.x,m.y);
  for(const s of spikes) if(!s.building) drawSpike(s.x, s.y);
  for(const bee of bees) drawBee(bee);
  for(const b of birds) drawBird(b);
  for(const c of coconuts) drawCoconut(c.x,c.y);
  for(const b of bananas) drawBanana(b.x,b.y,b.spin);
  drawPlayer(player);
  drawParticles();
}
function drawParticles(){
  for(const q of particles){ ctx.fillStyle=q.col; ctx.globalAlpha=clamp(q.life/40,0,1); ctx.beginPath(); ctx.arc(q.x,q.y,q.r,0,6.29); ctx.fill(); }
  ctx.globalAlpha=1;
  for(const f of floatTexts){ ctx.globalAlpha=clamp(f.life/48,0,1); ctx.fillStyle=f.col; ctx.font='bold 22px system-ui'; ctx.textAlign='center'; ctx.fillText(f.txt,f.x,f.y); }
  ctx.globalAlpha=1;
}

function drawCliff(x,w,isStart){
  const top=CLIFF_TOP;
  if (level && level.zone === 1){
    // City rooftop: concrete slab with a parapet edge + lit windows down the face.
    ctx.fillStyle='#4a4e5e'; ctx.fillRect(x,top,w,VH-top);
    ctx.fillStyle='rgba(0,0,0,0.18)'; ctx.fillRect(x,top+16,w,VH-top);
    ctx.fillStyle='#6d7284'; ctx.fillRect(x,top-8,w,12);
    ctx.fillStyle='rgba(255,222,130,0.7)';
    for(let wy=top+22; wy<VH; wy+=22){ for(let wx=x+8; wx<x+w-8; wx+=20){ if(((wx+wy)|0)%3) ctx.fillRect(wx,wy,10,13); } }
    return;
  }
  ctx.fillStyle='#9a8b76'; ctx.fillRect(x,top,w,VH-top);
  ctx.fillStyle='rgba(0,0,0,0.12)'; ctx.fillRect(x,top+18,w,VH-top);
  ctx.fillStyle='#57b94f'; ctx.fillRect(x,top-10,w,18);
  ctx.fillStyle='#66cf5c'; for(let gx=x+4;gx<x+w;gx+=12){ ctx.beginPath(); ctx.moveTo(gx,top-10); ctx.lineTo(gx+4,top-20); ctx.lineTo(gx+8,top-10); ctx.fill(); }
}
// The whole finish cliff is the goal — a bold checkerboard line marks it so it's
// obvious that touching ANY of it clears the level.
function drawFinishLine(x){
  const sq=15, topY=90;
  // checkered band running the full height, right at the finish edge
  for(let yy=topY; yy<VH; yy+=sq){
    const row=Math.floor((yy-topY)/sq);
    for(let i=0;i<2;i++){
      ctx.fillStyle=((row+i)%2===0)?'#20242b':'#f6f6f6';
      ctx.fillRect(x-sq+i*sq, yy, sq, sq);
    }
  }
  // pole + waving checkered flag on top
  ctx.fillStyle='#6b5330'; ctx.fillRect(x-2, 40, 4, topY-40);
  const wav=Math.sin(game.t*0.12)*4;
  for(let r=0;r<3;r++) for(let cc=0;cc<4;cc++){
    ctx.fillStyle=((r+cc)%2===0)?'#20242b':'#f6f6f6';
    ctx.fillRect(x+2+cc*11, 42+r*10+ (cc*wav*0.4), 11, 10);
  }
  // little "FINISH" tag
  ctx.fillStyle='#20242b'; ctx.font='bold 13px system-ui'; ctx.textAlign='center';
  ctx.save(); ctx.translate(x+2, 128); ctx.fillStyle='rgba(255,255,255,0.9)';
  roundRect(-30,-14,60,20,6); ctx.fill(); ctx.fillStyle='#20242b'; ctx.fillText('FINISH',0,0); ctx.restore();
}
function drawTree(t){
  if (level && level.zone === 1){ drawCable(t); return; }
  // A moving vine's top tracks its (drifting) anchor.
  const topX = t.anchor && t.anchor.mv ? t.anchor.x : t.x + Math.sin(game.t*0.02+t.sway)*4;
  const sway = topX - t.x;
  ctx.strokeStyle='#6b4a2f'; ctx.lineWidth=t.w; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(t.x,VH+20); ctx.quadraticCurveTo(t.x-6,(VH+t.top)/2,topX,t.top); ctx.stroke();
  ctx.lineWidth=7; ctx.beginPath(); ctx.moveTo(t.x,t.top+50); ctx.lineTo(t.x-30,t.top+30); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(t.x,t.top+80); ctx.lineTo(t.x+34,t.top+58); ctx.stroke();
  const fx=topX, fy=t.top, fol=(cx,cy,r,c)=>{ctx.fillStyle=c;ctx.beginPath();ctx.arc(cx,cy,r,0,6.29);ctx.fill();};
  fol(fx-24,fy-6,30,'#2f8f3e'); fol(fx+24,fy-6,30,'#2f8f3e'); fol(fx,fy-30,34,'#3fa34d'); fol(fx-10,fy+6,26,'#37953f'); fol(fx+14,fy+2,24,'#43ad51');
  if(t.coconut){ ctx.fillStyle='#5a3d22'; ctx.beginPath(); ctx.arc(fx-12,fy+14,6,0,6.29); ctx.arc(fx+8,fy+16,6,0,6.29); ctx.fill(); }
  // grab knob (highlighted so kids can see where to tap)
  ctx.fillStyle='rgba(60,40,25,0.85)'; ctx.beginPath(); ctx.arc(t.x+sway,t.top,6,0,6.29); ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.5)'; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(t.x+sway,t.top,9,0,6.29); ctx.stroke();
}
// City: a utility pole holding an electricity cable you swing on. LIVE cables
// crackle yellow and zap you if you grab them.
function drawCable(t){
  const a = t.anchor;
  const topX = a && a.mv ? a.x : t.x + Math.sin(game.t*0.02+t.sway)*3;
  const live = a && a.live;
  // pole down to the ground

function renderBoss(){

    ctx.fillStyle= cz===1 ? 'rgba(230,235,245,0.9)' : 'rgba(60,40,25,0.85)'; ctx.beginPath(); ctx.arc(a.x,a.y,6,0,6.29); ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.5)'; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(a.x,a.y,9,0,6.29); ctx.stroke(); }

  for(const bar of boss.barrels) cz===1 ? drawBriefcase(bar.x,bar.y,bar.spin) : drawBarrel(bar.x,bar.y,bar.spin);

  ctx.fillStyle='#fff'; ctx.font='bold 13px system-ui'; ctx.textAlign='center'; ctx.fillText((cz===1?'CITY GORILLA':'GORILLA BOSS')+'  •  Lvl '+level.n,VW/2,87);
  // Pan-uses left.
  if(game.armed && game.panUses>0){ ctx.save(); ctx.translate(30,110); panIcon(0,0,0.8); ctx.restore();
    ctx.textAlign='left'; ctx.fillStyle='#fff'; ctx.font='bold 15px system-ui'; ctx.fillText('× '+game.panUses,46,114); }
  // On-screen D-pad.

function drawDpad(){
  const btn=(b,draw)=>{ const held=(b===BTN.left&&bossBtn.left)||(b===BTN.right&&bossBtn.right);
    ctx.fillStyle=held?'rgba(255,255,255,0.5)':'rgba(255,255,255,0.28)'; ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,6.29); ctx.fill();
    ctx.strokeStyle='rgba(30,40,35,0.5)'; ctx.lineWidth=3; ctx.stroke();
    ctx.fillStyle='rgba(30,50,42,0.85)'; draw(b); };
  btn(BTN.left,b=>{ ctx.beginPath(); ctx.moveTo(b.x+11,b.y-16); ctx.lineTo(b.x-13,b.y); ctx.lineTo(b.x+11,b.y+16); ctx.fill(); });
  btn(BTN.right,b=>{ ctx.beginPath(); ctx.moveTo(b.x-11,b.y-16); ctx.lineTo(b.x+13,b.y); ctx.lineTo(b.x-11,b.y+16); ctx.fill(); });
  btn(BTN.jump,b=>{ ctx.beginPath(); ctx.moveTo(b.x,b.y-18); ctx.lineTo(b.x-15,b.y+6); ctx.lineTo(b.x+15,b.y+6); ctx.fill();
    ctx.font='bold 12px system-ui'; ctx.textAlign='center'; ctx.fillText('JUMP',b.x,b.y+20); });
}
function drawGorilla(g){
  const suit = (level && level.zone === 1);   // City boss wears a business suit + shades
  ctx.save(); ctx.translate(g.x, g.y);
  if(g.hurt>0 && Math.floor(game.t/3)%2===0) ctx.globalAlpha=0.6;
  const bob=Math.sin(g.anim)*3, arm=Math.max(0,Math.sin(g.anim*2))*10;
  ctx.fillStyle='#3b3b45';
  // legs
  ctx.beginPath(); ctx.ellipse(-16,-6,11,14,0,0,6.29); ctx.ellipse(16,-6,11,14,0,0,6.29); ctx.fill();
  // body
  ctx.beginPath(); ctx.ellipse(0,-48+bob,34,38,0,0,6.29); ctx.fill();
  if(suit){
    // dark suit jacket with white shirt + tie
    ctx.fillStyle='#20232e'; ctx.beginPath(); ctx.ellipse(0,-46+bob,32,36,0,0,6.29); ctx.fill();
    ctx.fillStyle='#f2f2f4'; ctx.beginPath(); ctx.moveTo(-9,-70+bob); ctx.lineTo(9,-70+bob); ctx.lineTo(4,-22+bob); ctx.lineTo(-4,-22+bob); ctx.closePath(); ctx.fill();
    ctx.fillStyle='#b5232a'; ctx.beginPath(); ctx.moveTo(0,-66+bob); ctx.lineTo(-5,-56+bob); ctx.lineTo(0,-30+bob); ctx.lineTo(5,-56+bob); ctx.closePath(); ctx.fill();
    // lapels
    ctx.fillStyle='#171922'; ctx.beginPath(); ctx.moveTo(-9,-70+bob); ctx.lineTo(-2,-64+bob); ctx.lineTo(-9,-40+bob); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(9,-70+bob); ctx.lineTo(2,-64+bob); ctx.lineTo(9,-40+bob); ctx.closePath(); ctx.fill();
  } else {
    ctx.fillStyle='#5a5a68'; ctx.beginPath(); ctx.ellipse(0,-42+bob,20,26,0,0,6.29); ctx.fill();
  }
  // arms
  ctx.fillStyle= suit ? '#20232e' : '#3b3b45'; ctx.lineWidth=0;
  ctx.beginPath(); ctx.ellipse(-40,-40+bob-arm,10,26,0.2,0,6.29); ctx.fill();
  ctx.beginPath(); ctx.ellipse(40,-40+bob-arm,10,26,-0.2,0,6.29); ctx.fill();
  // head
  ctx.fillStyle='#3b3b45'; ctx.beginPath(); ctx.ellipse(0,-92+bob,24,22,0,0,6.29); ctx.fill();
  ctx.fillStyle='#6a6a78'; ctx.beginPath(); ctx.ellipse(0,-86+bob,15,13,0,0,6.29); ctx.fill();
  ctx.fillStyle='#c98a5a'; ctx.beginPath(); ctx.ellipse(0,-82+bob,7,4,0,0,6.29); ctx.fill();
  if(suit){
    // sunglasses
    ctx.fillStyle='#0c0d12'; roundRect(-15,-96+bob,12,8,2); ctx.fill(); roundRect(3,-96+bob,12,8,2); ctx.fill();
    ctx.fillRect(-3,-94+bob,6,2);
    ctx.fillStyle='rgba(255,255,255,0.25)'; ctx.fillRect(-13,-95+bob,4,2); ctx.fillRect(5,-95+bob,4,2);
  } else {
    ctx.fillStyle='#1e1e26'; ctx.beginPath(); ctx.arc(-7,-92+bob,3,0,6.29); ctx.arc(7,-92+bob,3,0,6.29); ctx.fill();
  }
  // angry brow
  ctx.strokeStyle='#1e1e26'; ctx.lineWidth=3; ctx.beginPath(); ctx.moveTo(-12,-98+bob); ctx.lineTo(-3,-95+bob); ctx.moveTo(12,-98+bob); ctx.lineTo(3,-95+bob); ctx.stroke();
  ctx.restore();
}

/* ---------- HUD ---------- */
function drawHUD(){
  // lives (mini sausages)
  for(let i=0;i<START_LIVES;i++){ const x=20+i*23,y=32; ctx.globalAlpha=i<game.lives?1:0.22; ctx.save(); ctx.translate(x,y); ctx.scale(0.42,0.42);
    ctx.fillStyle='#e0824a'; ctx.strokeStyle='#a4531f'; ctx.lineWidth=4; capsulePath(0,0,15,40); ctx.fill(); ctx.stroke(); drawFace(0,-8,'happy'); ctx.restore(); ctx.globalAlpha=1; }
  // level + score
  ctx.fillStyle='#1e3a2e'; ctx.textAlign='right'; ctx.font='bold 26px system-ui'; ctx.fillText('LVL '+game.level,VW-16,34);
  ctx.font='bold 15px system-ui'; ctx.fillStyle='#2a4a3a'; ctx.fillText('Cleared: '+game.score+'   Best: '+game.best,VW-16,55);
  // coin counter (mini-sausage)
  ctx.save(); ctx.translate(30,68); ctx.scale(0.7,0.7); ctx.rotate(0.5); ctx.fillStyle='#e0824a'; ctx.strokeStyle='#a4531f'; ctx.lineWidth=3; capsulePath(0,0,7,18); ctx.fill(); ctx.stroke(); ctx.restore();
  ctx.textAlign='left'; ctx.fillStyle='#1e3a2e'; ctx.font='bold 16px system-ui'; ctx.fillText('x '+game.coins,42,74);
  // gold counter (persistent — for the shop)
  ctx.save(); ctx.translate(30,92); ctx.scale(0.62,0.62); drawGold(0,0); ctx.restore();
  ctx.textAlign='left'; ctx.fillStyle='#8a6a12'; ctx.font='bold 16px system-ui'; ctx.fillText('x '+game.gold,42,98);
  // zone label
  if(level){ ctx.textAlign='center'; ctx.fillStyle=level.zone===1?'#ffe6a0':'#1e3a2e'; ctx.font='bold 12px system-ui'; ctx.fillText((ZONE_NAMES[level.zone]||'').toUpperCase()+' • '+level.zl+'/10', VW/2, 20); }
  // armed
  if(game.armed && game.state!==S.BOSS){ ctx.save(); ctx.translate(VW-28,80); panIcon(0,0,0.85); ctx.restore(); ctx.textAlign='right'; ctx.fillStyle='#1e3a2e'; ctx.font='bold 13px system-ui'; ctx.fillText('armed!',VW-44,84); }
  // progress bar (normal levels)
  if(game.state===S.PLAY){ const prog=clamp((player.x-CLIFF_W)/(level.endCliffX-CLIFF_W),0,1);
    ctx.fillStyle='rgba(0,0,0,0.15)'; roundRect(120,VH-24,VW-140,8,4); ctx.fill();
    ctx.fillStyle='#57b94f'; roundRect(120,VH-24,(VW-140)*prog,8,4); ctx.fill();
    ctx.save(); ctx.translate(120+(VW-140)*prog,VH-20); ctx.scale(0.28,0.28); ctx.fillStyle='#e0824a'; capsulePath(0,0,15,40); ctx.fill(); ctx.restore();
    if(level.boss){ ctx.fillStyle='#3b3b45'; ctx.font='16px system-ui'; ctx.textAlign='right'; ctx.fillText('🦍',VW-14,VH-16); }
    // in-play "view leaderboard" button (bottom-left)
    ctx.fillStyle='rgba(16,30,26,0.4)'; ctx.beginPath(); ctx.arc(LBBTN.x,LBBTN.y,LBBTN.r,0,6.29); ctx.fill();
    ctx.font='22px system-ui'; ctx.textAlign='center'; ctx.fillText('🏆',LBBTN.x,LBBTN.y+8);
    drawMuteBtn(); }
  // pan toast
  if(game.panMsg>0){ ctx.globalAlpha=clamp(game.panMsg/40,0,1); ctx.textAlign='center'; ctx.fillStyle='#1e3a2e'; ctx.font='bold 18px system-ui'; ctx.fillText('🍳 Frying pan! Save it for the gorilla',VW/2,VH*0.24); ctx.globalAlpha=1; }
  // level-1 control hint
  if(game.hint>0 && game.state===S.PLAY){ ctx.globalAlpha=clamp(game.hint/60,0,1); ctx.textAlign='center'; ctx.fillStyle='#1e3a2e'; ctx.font='bold 17px system-ui';
    ctx.fillText('👆 Tap a treetop to grab it',VW/2,VH*0.30); ctx.font='14px system-ui'; ctx.fillText('Let go to fly • Tap again to pump higher',VW/2,VH*0.335); ctx.globalAlpha=1; }
}

/* ---------- Overlays ---------- */
function drawOverlays(){
  ctx.setTransform(scale*dpr,0,0,scale*dpr,offX*dpr,offY*dpr);
  ctx.save(); ctx.beginPath(); ctx.rect(0,0,VW,VH); ctx.clip(); ctx.textAlign='center';
  if(game.paused){ drawBoardScreen(); ctx.restore(); return; }   // in-play leaderboard
  if(game.state===S.MENU){
    if(game.viewBoard){ drawBoardScreen(); ctx.restore(); return; }
    panel(); title('SAUSAGE SWING',VH*0.22);
    ctx.save(); ctx.translate(VW/2,VH*0.35); ctx.scale(1.45,1.45);
    const sp=player; player={mode:'swing',ax:0,ay:-90,x:0,y:0,vx:0,vy:0,legPh:game.t*0.1,r:15,face:'happy',iframe:0};
    const a=game.armed; game.armed=false; drawPlayer(player); game.armed=a; player=sp; ctx.restore();
    body(['Tap a TREETOP to grab it & swing.','Let go to fly to the next tree.','TAP again mid-swing to pump higher.','Two fingers to climb up the rope.','Grab 🌭 mini-sausages & the 🍳 pan —','beat the 🦍 GORILLA every 3rd level!'],VH*0.48);
    if(hasSave()){
      const s=loadProgress();
      cta('CONTINUE • Lvl '+s.level, VH*0.78);
      ctx.fillStyle='rgba(255,255,255,0.15)'; roundRect(VW/2-90,VH*0.835-16,180,32,16); ctx.fill();
      ctx.fillStyle='#eaf6ef'; ctx.font='bold 15px system-ui'; ctx.textAlign='center'; ctx.fillText('Start a new game',VW/2,VH*0.835+5);
    } else {
      cta('TAP TO PLAY',VH*0.79);
    }
    // Leaderboard button
    ctx.fillStyle='#ffd23f'; roundRect(VW/2-100,VH*0.895-19,200,38,19); ctx.fill();
    ctx.fillStyle='#7a3d16'; ctx.font='bold 18px system-ui'; ctx.textAlign='center'; ctx.fillText('🏆 Leaderboard',VW/2,VH*0.895+6);
    // nickname (tap to change)
    ctx.fillStyle='#cfe0d8'; ctx.font='bold 15px system-ui'; ctx.fillText('👤 '+(getName()||'tap to set your name')+'   ✎', VW/2, VH*0.95);
    ctx.textAlign='right'; ctx.fillStyle='rgba(255,255,255,0.4)'; ctx.font='12px system-ui'; ctx.fillText(GAME_VERSION, VW-8, VH-8); ctx.textAlign='center';
    // gold total (spend it in the shop — coming soon)
    ctx.save(); ctx.translate(VW/2-52,VH*0.155); ctx.scale(0.9,0.9); drawGold(0,0); ctx.restore();
    ctx.fillStyle='#ffe6a0'; ctx.font='bold 18px system-ui'; ctx.textAlign='left'; ctx.fillText('x '+game.gold+'  gold', VW/2-34, VH*0.155+6); ctx.textAlign='center';
    // reset-everything button (top-right)
    const armed=game.resetArm>0; ctx.fillStyle=armed?'#e0574a':'rgba(255,255,255,0.16)';
    roundRect(RESETBTN.x-RESETBTN.w/2,RESETBTN.y-RESETBTN.h/2,RESETBTN.w,RESETBTN.h,15); ctx.fill();
    ctx.fillStyle=armed?'#fff':'#eaf6ef'; ctx.font='bold 13px system-ui'; ctx.textAlign='center';
    ctx.fillText(armed?'Sure? Tap':'🔄 Reset', RESETBTN.x, RESETBTN.y+5);
    drawMuteBtn();
    if(game.partyMsg>0){ game.partyMsg--; ctx.fillStyle='#ffd23f'; ctx.font='bold 22px system-ui'; ctx.fillText(game.party?'🎉 PARTY SAUSAGE! 🎉':'party off', VW/2, VH*0.20); }
    drawConfetti();
  } else if(game.state===S.OVER){
    panel(); title('GAME OVER',VH*0.12);
    ctx.textAlign='center'; ctx.fillStyle='#fff'; ctx.font='bold 22px system-ui';
    ctx.fillText('You cleared '+game.score+(game.score===1?' level':' levels'),VW/2,VH*0.19);
    // World rank readout.
    if(SUPA_ON && game.score>0){
      let rt;
      if(game.rank==='loading'||game.rank==null) rt = game.rank==='loading' ? 'Finding your rank…' : '';
      else if(game.rank===1) rt = '🥇 WORLD #1!!';
      else rt = "You're world #"+game.rank+'!';
      if(rt){ ctx.fillStyle= game.rank===1?'#ffd23f':'#8fe0a0'; ctx.font='bold 26px system-ui'; ctx.fillText(rt, VW/2, VH*0.25); }
    }
    ctx.fillStyle='#ffd23f'; ctx.font='bold 18px system-ui'; ctx.fillText(SUPA_ON?'🏆 LEADERBOARD':'🏆 HIGH SCORES',VW/2,VH*0.31);
    drawBoard(VH*0.355, 8);
    cta('TAP TO TRY AGAIN',VH*0.9);
  } else if(game.state===S.CLEAR){
    ctx.fillStyle='#1e5631'; ctx.font='bold 40px system-ui'; ctx.strokeStyle='#fff'; ctx.lineWidth=5;
    ctx.strokeText('LEVEL '+game.level+' CLEAR!',VW/2,VH*0.35); ctx.fillText('LEVEL '+game.level+' CLEAR!',VW/2,VH*0.35);
  } else if(game.state===S.BOSSWIN){
    ctx.fillStyle='#1e5631'; ctx.font='bold 38px system-ui'; ctx.strokeStyle='#fff'; ctx.lineWidth=5;
    ctx.strokeText('GORILLA DOWN! 🦍',VW/2,VH*0.34); ctx.fillText('GORILLA DOWN! 🦍',VW/2,VH*0.34);
  } else if(game.state===S.DYING){
    ctx.fillStyle='rgba(120,20,10,0.25)'; ctx.fillRect(0,0,VW,VH); ctx.fillStyle='#fff'; ctx.font='bold 30px system-ui'; ctx.fillText('Ouch! Lives left: '+game.lives,VW/2,VH*0.4);
  }
  ctx.restore();
}
function drawScoreList(y0, count){
  const scores = getScores(), lh = 27;
  if(scores.length===0){ ctx.textAlign='center'; ctx.fillStyle='#aeb8b4'; ctx.font='16px system-ui'; ctx.fillText('No scores yet — be the first!', VW/2, y0+10); return; }
  for(let i=0;i<Math.min(count,scores.length);i++){
    const s=scores[i], y=y0+i*lh, hi=(i===game.newIdx);
    if(hi){ ctx.fillStyle='rgba(255,210,63,0.18)'; roundRect(VW/2-135, y-18, 270, 24, 6); ctx.fill(); }
    ctx.fillStyle = hi ? '#ffd23f' : '#eaf6ef'; ctx.font = (hi?'bold ':'')+'18px system-ui';
    ctx.textAlign='left';  ctx.fillText((i+1)+'.', VW/2-128, y); ctx.fillText(String(s.name).slice(0,10), VW/2-104, y);
    ctx.textAlign='right'; ctx.fillText(String(s.score), VW/2+128, y);
  }
  ctx.textAlign='center';
}
function drawRows(rows, y0, count, hiName, hiScore){
  const lh = 27;
  if(!rows || rows.length===0){ ctx.textAlign='center'; ctx.fillStyle='#aeb8b4'; ctx.font='16px system-ui'; ctx.fillText('No scores yet — be the first!', VW/2, y0+10); return; }
  let hiDone=false;
  for(let i=0;i<Math.min(count,rows.length);i++){
    const s=rows[i], y=y0+i*lh;
    const hi = !hiDone && hiName!=null && String(s.name)===String(hiName) && s.score===hiScore;
    if(hi){ hiDone=true; ctx.fillStyle='rgba(255,210,63,0.18)'; roundRect(VW/2-135,y-18,270,24,6); ctx.fill(); }
    ctx.fillStyle=hi?'#ffd23f':'#eaf6ef'; ctx.font=(hi?'bold ':'')+'18px system-ui';
    ctx.textAlign='left';  ctx.fillText((i+1)+'.', VW/2-128, y); ctx.fillText(String(s.name).slice(0,10), VW/2-104, y);
    ctx.textAlign='right'; ctx.fillText(String(s.score), VW/2+128, y);
  }
  ctx.textAlign='center';
}
// Online board when configured, with a graceful fall back to this device.
function drawBoard(y0, count){
  if(SUPA_ON){
    if(onlineScores===null || onlineScores==='loading'){ ctx.textAlign='center'; ctx.fillStyle='#cfe0d8'; ctx.font='16px system-ui'; ctx.fillText('Loading leaderboard…', VW/2, y0+10); return; }
    if(onlineScores==='error'){ ctx.textAlign='center'; ctx.fillStyle='#e6b0a0'; ctx.font='14px system-ui'; ctx.fillText('Offline — showing this device', VW/2, y0-8); drawScoreList(y0+18, count); return; }
    drawRows(onlineScores, y0, count, getName(), game.score); return;
  }
  drawScoreList(y0, count);
}
function drawBoardScreen(){
  panel(); title('LEADERBOARD',VH*0.12);
  ctx.textAlign='center'; ctx.fillStyle='#cfe0d8'; ctx.font='14px system-ui'; ctx.fillText('Top players everywhere', VW/2, VH*0.16);
  drawBoard(VH*0.22, 15);
  ctx.textAlign='center'; ctx.fillStyle='#ffd23f'; ctx.font='bold 16px system-ui'; ctx.fillText(game.paused?'tap to resume':'tap to go back', VW/2, VH*0.95);
}
function drawMuteBtn(){
  ctx.fillStyle='rgba(16,30,26,0.4)'; ctx.beginPath(); ctx.arc(MUTEBTN.x,MUTEBTN.y,MUTEBTN.r,0,6.29); ctx.fill();
  ctx.font='20px system-ui'; ctx.textAlign='center'; ctx.fillStyle='#fff'; ctx.fillText(musicOn?'🔊':'🔇', MUTEBTN.x, MUTEBTN.y+7);
}
function panel(){ ctx.fillStyle='rgba(16,30,26,0.74)'; ctx.fillRect(0,0,VW,VH); }
function title(txt,y){ ctx.fillStyle='#ffd23f'; ctx.font='bold 42px system-ui'; ctx.strokeStyle='#7a3d16'; ctx.lineWidth=6; ctx.lineJoin='round'; ctx.strokeText(txt,VW/2,y); ctx.fillText(txt,VW/2,y); }
function body(lines,y){ ctx.fillStyle='#eaf6ef'; ctx.font='16px system-ui'; lines.forEach((l,i)=>ctx.fillText(l,VW/2,y+i*24)); }
function cta(txt,y){ const w=260,h=58,x=VW/2-w/2,pulse=1+Math.sin(game.t*0.12)*0.03; ctx.save(); ctx.translate(VW/2,y); ctx.scale(pulse,pulse); ctx.translate(-VW/2,-y);
  ctx.fillStyle='#ffd23f'; roundRect(x,y-h/2,w,h,16); ctx.fill(); ctx.fillStyle='#7a3d16'; ctx.font='bold 24px system-ui'; ctx.textAlign='center'; ctx.fillText(txt,VW/2,y+8); ctx.restore(); }
function roundRect(x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }

/* ============================================================================
   MAIN LOOP
   ========================================================================== */
let acc=0, last=0; const STEP=1000/60;
function frame(now){
  if(!last) last=now; let dt=now-last; last=now; if(dt>250) dt=250; acc+=dt;
  let guard=0; while(acc>=STEP && guard++<6){ step(); acc-=STEP; }
  render(); requestAnimationFrame(frame);
}
clouds=makeClouds(); level=genLevel(1); anchors=level.anchors; trees=level.trees;
monkeys=[]; bananas=[]; particles=[]; coins=[]; goldcoins=[]; birds=[]; coconuts=[]; spikes=[]; bees=[]; powerups=[]; floatTexts=[];
player={x:CLIFF_W-40,y:CLIFF_TOP-STAND_DY,vx:0,vy:0,mode:'stand',ax:0,ay:0,L:0,curA:null,iframe:0,invuln:0,face:'happy',legPh:0,r:15,onGround:true};
requestAnimationFrame(frame);

document.getElementById('nameinput').addEventListener('keydown', e => { if (e.key === 'Enter') commitName(); });
if (!getName()) openNick();   // ask once on first ever launch

if('serviceWorker' in navigator){ window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{})); }
