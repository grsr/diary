<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#7ec8e3">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Sausage Swing">
<title>Sausage Swing</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" href="icon-192.png">
<style>
  html,body{
    margin:0;padding:0;height:100%;overflow:hidden;background:#0a1a24;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
    -webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent;
    overscroll-behavior:none;touch-action:none;
  }
  #wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
    background:linear-gradient(#5bb4d6,#0a1a24);}
  canvas{display:block;touch-action:none;}
</style>
</head>
<body>
<div id="wrap"><canvas id="c"></canvas></div>
<script>
"use strict";
/* ============================================================================
   SAUSAGE SWING  —  swing a stick-limbed sausage tree to tree, dodge hazards,
   collect mini-sausages, grab the frying pan, and battle a gorilla boss.

   Controls:
     • Tap the TOP OF A TREE to shoot a rope and swing to it.
     • Hold to keep swinging, let go to fly.
     • SHAKE the phone to swing higher (or press P on a keyboard).
     • Tap with a SECOND finger to climb up the rope.
   ========================================================================== */

const cvs = document.getElementById('c');
const ctx = cvs.getContext('2d');

const VW = 480, VH = 854;
let scale = 1, offX = 0, offY = 0, dpr = 1;
function resize(){
  dpr = Math.min(window.devicePixelRatio || 1, 3);
  const w = window.innerWidth, h = window.innerHeight;
  scale = Math.min(w / VW, h / VH);
  offX = (w - VW * scale) / 2; offY = (h - VH * scale) / 2;
  cvs.style.width = w + 'px'; cvs.style.height = h + 'px';
  cvs.width = Math.round(w * dpr); cvs.height = Math.round(h * dpr);
}
window.addEventListener('resize', resize); resize();

// Screen point -> world point (x offset by camera).
function toWorld(clientX, clientY){
  return { x: (clientX - offX) / scale + game.camX, y: (clientY - offY) / scale };
}

/* ---------- RNG ---------- */
function mulberry32(a){
  return function(){
    a |= 0; a = (a + 0x6D2B79F5) | 0;
    let t = Math.imul(a ^ (a >>> 15), 1 | a);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

/* ---------- Tunables ---------- */
const G           = 0.37;  // a touch slower / gentler swinging
const AIR         = 0.994;
const GRAPPLE     = 400;   // how far the player can physically reach a vine
const TAP_TOL     = 100;   // how close your tap must be to a treetop
const RELEASE_KICK= 1.07;
const MAXV        = 23;
const CLIFF_TOP   = Math.round(VH * 0.60);
const CLIFF_W     = 240;
const STAND_DY    = 63;    // lift so the sausage's feet rest ON the grass
const CLIMB_SPEED = 3.2;   // rope shortening per step while climbing
const CLIMB_MIN   = 70;
const SHAKE_BOOST = 2.4;   // tangential speed added per shake/pump
const SHAKE_THRESH= 9;     // lower = easier to trigger a shake
const HELPER_CAP  = 6;
const START_LIVES = 5;
const WALK        = 3.8;   // boss: walk speed (on-screen buttons)
const JUMP_V      = 11.5;  // boss: jump strength
const BG          = 0.6;   // boss: gravity (snappy platforming)

/* ---------- Game state ---------- */
const S = { MENU:0, PLAY:1, DYING:2, CLEAR:3, OVER:4, BOSS:5, BOSSWIN:6 };
const game = {
  state: S.MENU, level: 1, lives: START_LIVES, score: 0,
  best: +(localStorage.getItem('sausageBest') || 0),
  coins: 0,                       // mini-sausages banked this run
  camX: 0, shake: 0, t: 0, timer: 0,
  armed: false, panMsg: 0, arena: false, hint: 0, diedInBoss: false,
};

let player, anchors, trees, monkeys, bananas, particles, clouds, pan, level,
    coins, birds, coconuts, spikes, boss, floatTexts;

/* ---------- Saved progress (resume at the level you reached) ---------- */
function saveProgress(){ try { localStorage.setItem('sausageSave', JSON.stringify({ level:game.level, score:game.score, lives:game.lives, coins:game.coins })); } catch(_){} }
function loadProgress(){ try { return JSON.parse(localStorage.getItem('sausageSave') || 'null'); } catch(_){ return null; } }
function clearProgress(){ try { localStorage.removeItem('sausageSave'); } catch(_){} }
function hasSave(){ const s = loadProgress(); return s && s.level > 1; }

/* ============================================================================
   INPUT  —  tap a treetop to grab; second finger climbs; shake pumps.
   ========================================================================== */
const pointers = new Map();     // pointerId -> {x,y} world pos at press
let grappleId = null;           // finger currently holding the rope
let motionAsked = false;
// Boss on-screen D-pad.
const pointerBtn = new Map();   // pointerId -> 'left'|'right'|'jump'
const bossBtn = { left:false, right:false };
function toScreen(cx, cy){ return { x:(cx-offX)/scale, y:(cy-offY)/scale }; }  // virtual, no camera
// Button hit-boxes (virtual coords), only used during the boss fight.
const BTN = {
  left:  { x:66,     y:VH-92, r:50 },
  right: { x:180,    y:VH-92, r:50 },
  jump:  { x:VW-74,  y:VH-92, r:58 },
};
function inBtn(p, b){ return Math.hypot(p.x-b.x, p.y-b.y) <= b.r; }

function onDown(e){
  e.preventDefault();
  pointers.set(e.pointerId, toWorld(e.clientX, e.clientY));
  startAudio(); requestMotion();
  if (game.state === S.MENU){ menuTap(e.clientX, e.clientY); return; }
  if (game.state === S.OVER){ startRun(); return; }
  if (game.state === S.BOSS){ bossPress(e.pointerId, e.clientX, e.clientY); return; }
  if (game.state !== S.PLAY) return;

  const p = player;
  if (p.mode === 'swing') return;   // a 2nd finger while swinging = climb
  const w = toWorld(e.clientX, e.clientY);
  const a = findAnchorAt(w.x, w.y);
  if (a){ attach(a); grappleId = e.pointerId; blip(660, 0.05); }
  else { blip(200, 0.03); }
}
function onUp(e){
  e.preventDefault();
  pointers.delete(e.pointerId);
  if (pointerBtn.has(e.pointerId)){ pointerBtn.delete(e.pointerId); recomputeBtns(); }
  if (e.pointerId === grappleId){
    if (player && player.mode === 'swing') detach();
    grappleId = null;
  }
}
function recomputeBtns(){ bossBtn.left = bossBtn.right = false; for (const v of pointerBtn.values()){ if (v==='left') bossBtn.left=true; if (v==='right') bossBtn.right=true; } }
function bossPress(id, cx, cy){
  const v = toScreen(cx, cy);
  if (inBtn(v, BTN.jump)){ bossJump(); }        // edge-triggered jump
  else if (inBtn(v, BTN.left)){ pointerBtn.set(id,'left'); bossBtn.left=true; }
  else if (inBtn(v, BTN.right)){ pointerBtn.set(id,'right'); bossBtn.right=true; }
  else if (player.mode !== 'swing'){            // tap a vine to swing in
    const a = findAnchorAt(v.x, v.y);
    if (a){ attach(a); grappleId = id; blip(660,0.05); }
  }
}
function bossJump(){ if (player.onGround){ player.vy = -JUMP_V; player.onGround=false; player.mode='fly'; blip(500,0.05); } }
function menuTap(cx, cy){
  const v = toScreen(cx, cy);
  // "New game" pill sits just below the main button when a save exists.
  if (hasSave() && v.y > VH*0.855-20 && v.y < VH*0.855+22 && Math.abs(v.x-VW/2) < 95){ clearProgress(); startRun(); return; }
  if (hasSave()) continueRun(); else startRun();
}
cvs.addEventListener('pointerdown', onDown, {passive:false});
cvs.addEventListener('pointerup', onUp, {passive:false});
cvs.addEventListener('pointercancel', onUp, {passive:false});
window.addEventListener('touchmove', e => e.preventDefault(), {passive:false});

// Desktop helpers: Space grabs the nearest treetop / jumps in the boss; ← → walk
// in the boss; Up climbs; P pumps.
window.addEventListener('keydown', e => {
  if (e.repeat) return;
  if (e.code === 'Space' || e.code === 'ArrowUp'){
    startAudio();
    if (game.state === S.MENU){ e.preventDefault(); hasSave() ? continueRun() : startRun(); return; }
    if (game.state === S.OVER){ e.preventDefault(); startRun(); return; }
    if (game.state === S.BOSS){ e.preventDefault(); bossJump(); return; }
    if (e.code === 'Space' && player && player.mode !== 'swing'){
      e.preventDefault(); const a = findNearestReachable(); if (a){ attach(a); grappleId = 'kbd'; }
    }
  }
  if (game.state === S.BOSS){ if (e.code==='ArrowLeft') bossBtn.left=true; if (e.code==='ArrowRight') bossBtn.right=true; }
  if (e.code === 'KeyP') pump();
});
window.addEventListener('keyup', e => {
  if (e.code === 'Space' && grappleId === 'kbd'){ if (player && player.mode === 'swing') detach(); grappleId = null; }
  if (e.code === 'ArrowLeft') bossBtn.left=false;
  if (e.code === 'ArrowRight') bossBtn.right=false;
});
const keysDown = new Set();
window.addEventListener('keydown', e => keysDown.add(e.code));
window.addEventListener('keyup',   e => keysDown.delete(e.code));

/* ---------- Motion (shake) ---------- */
let lastAccel = 0, shakeCd = 0;
function requestMotion(){
  if (motionAsked) return; motionAsked = true;
  try {
    if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function'){
      DeviceMotionEvent.requestPermission().then(s => { if (s === 'granted') window.addEventListener('devicemotion', onMotion); }).catch(()=>{});
    } else if (typeof DeviceMotionEvent !== 'undefined'){
      window.addEventListener('devicemotion', onMotion);
    }
  } catch(_) {}
}
function onMotion(e){
  const a = e.accelerationIncludingGravity || e.acceleration; if (!a) return;
  const mag = Math.hypot(a.x||0, a.y||0, a.z||0);
  const delta = Math.abs(mag - lastAccel); lastAccel = mag;
  if (delta > SHAKE_THRESH && shakeCd <= 0){ pump(); shakeCd = 6; }
}
function pump(){
  const p = player; if (!p || p.mode !== 'swing') return;
  const dx = p.x - p.ax, dy = p.y - p.ay, d = Math.hypot(dx, dy) || 1;
  const tx = -dy / d, ty = dx / d;                     // tangent
  const dir = (p.vx * tx + p.vy * ty) >= 0 ? 1 : -1;   // current swing direction
  p.vx += tx * dir * SHAKE_BOOST; p.vy += ty * dir * SHAKE_BOOST;
  clampV(p); game.shake = Math.max(game.shake, 5);
  spawnSpark(p.x, p.y, '#fff2a8'); blip(520, 0.04);
}

/* ---------- Tiny WebAudio blips ---------- */
let actx = null;
function startAudio(){ if (!actx){ try { actx = new (window.AudioContext||window.webkitAudioContext)(); } catch(_){} } if (actx && actx.state === 'suspended') actx.resume(); }
function blip(freq, dur, type){
  if (!actx) return;
  try {
    const o = actx.createOscillator(), g = actx.createGain();
    o.type = type || 'square'; o.frequency.value = freq;
    g.gain.value = 0.05; o.connect(g); g.connect(actx.destination);
    const now = actx.currentTime; o.start(now);
    g.gain.setValueAtTime(0.05, now); g.gain.exponentialRampToValueAtTime(0.0001, now + dur);
    o.stop(now + dur);
  } catch(_){}
}

/* ============================================================================
   LEVEL GENERATION
   ========================================================================== */
function genLevel(n){
  const rng = mulberry32((n * 2654435761) >>> 0);
  const spacing = 205 + Math.min(n * 7, 120);   // trees a bit further apart
  const bandLo  = 280, bandHi = 400 + Math.min(n * 8, 120);
  const startX  = CLIFF_W;
  let x = startX + 130;
  const A = [], T = [];
  const wantLen = 1500 + Math.min(n * 240, 5200);
  while (x < wantLen){
    const y = bandLo + rng() * (bandHi - bandLo);
    A.push({ x, y });
    T.push({ x, top: y, sway: rng() * 6.28, w: 16 + rng()*8, coconut: rng() < 0.4 && n >= 2, cd: 60 + rng()*120 });
    x += spacing * (0.85 + rng() * 0.4);
  }
  const lastA = A[A.length - 1] || { x: startX + 200 };
  const endCliffX = Math.min(lastA.x + spacing * 0.9, wantLen + 260);
  const levelLen = endCliffX + CLIFF_W;

  // Monkeys.
  const M = [];
  let mc = Math.min(Math.max(0, Math.round((n - 1) * 0.85)), Math.max(0, A.length - 3), 9);
  const idx = []; for (let i = 1; i < A.length - 1; i++) idx.push(i);
  for (let i = idx.length - 1; i > 0; i--){ const j = (rng()*(i+1))|0; [idx[i],idx[j]]=[idx[j],idx[i]]; }
  for (let i = 0; i < mc; i++){ const a = A[idx[i]]; if (!a) break;
    M.push({ x:a.x, y:a.y-6, alive:true, cd:40+rng()*60, rate:Math.max(60,150-n*6), speed:6.2+Math.min(n*0.22,5), face:rng() }); }

  // Mini-sausages (coins) along the swing path.
  const C = [];
  const coinCount = 3 + Math.min(n, 7);
  for (let i = 0; i < coinCount; i++){
    const t = (i + 0.5) / coinCount;
    const ax = startX + 160 + t * (endCliffX - startX - 300);
    const ay = bandLo + 120 + rng() * 180;
    C.push({ x: ax + (rng()-0.5)*60, y: ay, got:false, bob: rng()*6.28 });
  }

  // Birds (moving hazard), from level 2.
  const B = [];
  const birdCount = n >= 2 ? Math.min(Math.floor(n/2), 5) : 0;
  for (let i = 0; i < birdCount; i++){
    const bx = startX + 200 + rng() * (endCliffX - startX - 300);
    B.push({ x:bx, y:160 + rng()*180, baseY:0, amp:20+rng()*30, ph:rng()*6.28,
             vx:(rng()<0.5?-1:1)*(1.1+Math.min(n*0.12,2)), flap:rng()*6.28 });
    B[B.length-1].baseY = B[B.length-1].y;
  }

  // Spiky blocks floating in the sky — you must swing around them.
  const SP = [];
  const spikeCount = n >= 2 ? Math.min(Math.floor(n/2)+1, 6) : 0;
  for (let i = 0; i < spikeCount; i++){
    const t = (i + 0.7) / (spikeCount + 0.4);
    let sx = startX + 220 + t * (endCliffX - startX - 360);
    // nudge away from any treetop so a spike never sits on a grab point
    for (const a of A){ if (Math.abs(a.x - sx) < 70){ sx += 90; } }
    SP.push({ x:sx, y:190 + rng()*230, baseY:0, amp:(rng()<0.5?0:18+rng()*22), ph:rng()*6.28 });
    SP[SP.length-1].baseY = SP[SP.length-1].y;
  }

  const isBoss = (n % 3 === 0);
  // Frying pan on boss levels (you need it for the gorilla).
  let P = null;
  if (isBoss && A.length > 2){
    const a = A[(A.length/2)|0];
    P = { x:a.x + spacing*0.4, y:a.y + 120, got:false, bob:0 };
  }
  return { n, len:levelLen, endCliffX, anchors:A, trees:T, monkeys:M, coins:C, birds:B, spikes:SP, pan:P, boss:isBoss, bossDone:false };
}

/* ============================================================================
   LIFECYCLE
   ========================================================================== */
function startRun(){ clearProgress(); game.level = 1; game.lives = START_LIVES; game.score = 0; game.coins = 0; loadLevel(1); }
function continueRun(){ const s = loadProgress(); if (!s){ startRun(); return; } game.level = s.level; game.score = s.score; game.lives = s.lives; game.coins = s.coins; loadLevel(s.level); }

function loadLevel(n){
  game.level = n;
  level   = genLevel(n);
  anchors = level.anchors; trees = level.trees; monkeys = level.monkeys;
  coins   = level.coins;   birds = level.birds; pan = level.pan; spikes = level.spikes;
  bananas = []; particles = []; coconuts = []; floatTexts = []; boss = null;
  clouds = clouds || makeClouds();
  game.armed = false; game.camX = 0; game.state = S.PLAY; game.timer = 0; game.panMsg = 0;
  game.arena = false; game.hint = n === 1 ? 260 : 0;
  grappleId = null; pointers.clear(); pointerBtn.clear(); recomputeBtns();
  player = { x:CLIFF_W-40, y:CLIFF_TOP-STAND_DY, vx:0, vy:0, mode:'stand',
             ax:0, ay:0, L:0, curA:null, iframe:0, face:'happy', legPh:0, r:15, onGround:true };
  saveProgress();            // checkpoint at the start of every level
}
function retryLevel(){ loadLevel(game.level); }
function nextLevel(){
  game.score++;
  if (game.score > game.best){ game.best = game.score; localStorage.setItem('sausageBest', game.best); }
  game.level++; loadLevel(game.level);
}
function loseLife(reason){
  if (game.state !== S.PLAY && game.state !== S.BOSS) return;
  game.diedInBoss = (game.state === S.BOSS);   // a boss hit re-fights only the boss
  game.lives--; game.shake = 16;
  spawnSplat(player.x, player.y, reason==='banana'?'#ffd23f':'#c86b3a');
  blip(140, 0.25, 'sawtooth');
  if (game.lives <= 0){
    game.state = S.OVER; game.timer = 0; clearProgress();
    if (game.score > game.best){ game.best = game.score; localStorage.setItem('sausageBest', game.best); }
  } else { game.state = S.DYING; game.timer = 40; }
}

/* ---------- Grapple ---------- */
function findAnchorAt(tx, ty){   // aimed: nearest treetop to the tap, and reachable
  let best = null, bd = Infinity;
  for (const a of anchors){
    if (Math.hypot(a.x - tx, a.y - ty) > TAP_TOL) continue;
    if (Math.hypot(a.x - player.x, a.y - player.y) > GRAPPLE) continue;
    if (a.y > player.y + 90) continue;
    const d = Math.hypot(a.x - tx, a.y - ty);
    if (d < bd){ bd = d; best = a; }
  }
  return best;
}
function findNearestReachable(){   // desktop Space fallback
  let best = null, bs = Infinity;
  for (const a of anchors){
    const d = Math.hypot(a.x-player.x, a.y-player.y);
    if (d > GRAPPLE || a.y > player.y + 90) continue;
    let s = d + (a.x < player.x - 20 ? 300 : 0);
    if (s < bs){ bs = s; best = a; }
  }
  return best;
}
function attach(a){
  player.curA = a; player.ax = a.x; player.ay = a.y;
  player.L = Math.max(CLIMB_MIN, Math.hypot(a.x-player.x, a.y-player.y));
  if (player.mode === 'stand'){ player.vx = Math.sign(a.x-player.x)*2.2 || 2.2; player.vy = -1; }
  player.mode = 'swing';
}
function detach(){
  player.mode = 'fly';
  player.vx *= RELEASE_KICK; player.vy = player.vy*RELEASE_KICK - 0.4;
  clampV(player); blip(440, 0.05);
}
function clampV(p){ const s = Math.hypot(p.vx,p.vy); if (s > MAXV){ p.vx=p.vx/s*MAXV; p.vy=p.vy/s*MAXV; } }
function clamp(v,a,b){ return v<a?a:v>b?b:v; }

/* ---------- Swing/fly physics for one body against a floor ---------- */
function integrate(p, opts){
  const climbing = p.mode === 'swing' && ([...pointers.keys()].some(k => k !== grappleId) || keysDown.has('ArrowUp'));
  if (p.mode === 'swing'){
    if (climbing){ p.L = Math.max(CLIMB_MIN, p.L - CLIMB_SPEED); if (game.t % 6 === 0) blip(720,0.02); }
    p.vy += G; p.x += p.vx; p.y += p.vy;
    let dx=p.x-p.ax, dy=p.y-p.ay, d=Math.hypot(dx,dy)||1;
    const diff=(d-p.L)/d; p.x-=dx*diff; p.y-=dy*diff;
    dx=p.x-p.ax; dy=p.y-p.ay; d=Math.hypot(dx,dy)||1;
    const nx=dx/d, ny=dy/d, radial=p.vx*nx+p.vy*ny;
    p.vx-=radial*nx; p.vy-=radial*ny; p.vx*=0.999; clampV(p);
  } else if (p.mode === 'fly'){
    p.vy += G; p.vx *= AIR; p.x += p.vx; p.y += p.vy; clampV(p);
  }
  p.legPh += 0.2;
  if (p.iframe > 0) p.iframe--;
}

/* ============================================================================
   UPDATE (normal levels)
   ========================================================================== */
function step(){
  game.t++;
  if (game.shake > 0.5) game.shake *= 0.86; else game.shake = 0;
  if (game.panMsg > 0) game.panMsg--;
  if (game.hint  > 0) game.hint--;
  if (shakeCd > 0) shakeCd--;

  if (game.state === S.DYING){ if (--game.timer<=0){ if (game.diedInBoss){ game.diedInBoss=false; enterBoss(); } else retryLevel(); } updateParticles(); return; }
  if (game.state === S.CLEAR){ if (--game.timer<=0) nextLevel(); updateParticles(); return; }
  if (game.state === S.BOSSWIN){ if (--game.timer<=0){ level.bossDone=true; nextLevel(); } updateParticles(); return; }
  if (game.state === S.BOSS){ updateBoss(); return; }
  if (game.state !== S.PLAY){ updateParticles(); updateClouds(); return; }

  const p = player;
  integrate(p);

  const targetCam = clamp(p.x - VW*0.36, 0, level.len - VW);
  game.camX += (targetCam - game.camX) * 0.12;

  p.face = p.mode==='swing' ? 'happy' : p.mode==='fly' ? (p.vy>6?'worried':'ooh') : 'happy';

  // Pan pickup.
  if (pan && !pan.got){ pan.bob += 0.08;
    if (Math.hypot(pan.x-p.x, pan.y-p.y) < 34){ pan.got=true; game.armed=true; game.panMsg=150; blip(880,0.12); spawnSpark(pan.x,pan.y,'#cfd3d8'); } }

  // Mini-sausages.
  for (const c of coins){ if (c.got) continue; c.bob += 0.1;
    if (Math.hypot(c.x-p.x, c.y-p.y) < 30){ c.got=true; game.coins++; blip(1040,0.06); spawnText(c.x,c.y-10,'+1','#ffd27a'); for(let i=0;i<6;i++) spawnSpark(c.x,c.y,'#e0824a'); } }

  // Monkeys throw bananas / get whacked.
  for (const m of monkeys){ if (!m.alive) continue;
    if (game.armed && Math.hypot(m.x-p.x,m.y-p.y) < 30){ m.alive=false; game.shake=12; blip(300,0.08,'square'); spawnSplat(m.x,m.y,'#8b5a2b'); spawnText(m.x,m.y,'WHACK!','#fff'); continue; }
    const onScreen = m.x > game.camX-40 && m.x < game.camX+VW+40;
    if (onScreen && Math.abs(m.x-p.x) < VW*0.7){ if (--m.cd<=0){ m.cd = m.rate*(0.7+Math.random()*0.6); throwBanana(m,p); } }
  }
  // Bananas.
  for (const b of bananas){ b.vy += G*0.55; b.x+=b.vx; b.y+=b.vy; b.spin+=0.3;
    if (p.iframe<=0 && Math.hypot(b.x-p.x,b.y-p.y) < p.r+12){ b.dead=true; loseLife('banana'); }
    if (b.y>VH+60 || b.x<game.camX-80) b.dead=true; }
  bananas = bananas.filter(b=>!b.dead);

  // Coconuts drop from coconut-trees as the player passes.
  for (const t of trees){ if (!t.coconut) continue;
    if (Math.abs(t.x - p.x) < 120 && p.x < t.x + 40){ if ((t.cd-=1) <= 0){ t.cd = 150 + Math.random()*120; coconuts.push({ x:t.x, y:t.top+30, vy:0 }); } } }
  for (const c of coconuts){ c.vy += G*0.34; if (c.vy > 5) c.vy = 5; c.y += c.vy;   // gentler fall
    if (p.iframe<=0 && Math.hypot(c.x-p.x,c.y-p.y) < p.r+13){ c.dead=true; loseLife('coconut'); }
    if (c.y > VH+60) c.dead=true; }
  coconuts = coconuts.filter(c=>!c.dead);

  // Birds patrol; collision hurts.
  for (const bd of birds){ bd.x += bd.vx; bd.flap += 0.3; bd.y = bd.baseY + Math.sin(bd.ph + game.t*0.03)*bd.amp;
    if (bd.x < CLIFF_W-40 || bd.x > level.endCliffX+40) bd.vx *= -1;
    if (p.iframe<=0 && Math.hypot(bd.x-p.x,bd.y-p.y) < p.r+14){ p.iframe=1; loseLife('bird'); } }

  // Spiky sky blocks; collision hurts.
  for (const s of spikes){ if (s.amp) s.y = s.baseY + Math.sin(s.ph + game.t*0.02)*s.amp;
    if (p.iframe<=0 && Math.abs(s.x-p.x) < p.r+18 && Math.abs(s.y-p.y) < p.r+18){ p.iframe=1; loseLife('spike'); } }

  // Keep the sausage on screen — no vanishing off the top.
  if (p.y < 24 && p.mode !== 'swing'){ p.y = 24; if (p.vy < 0) p.vy = 0; }

  updateParticles(); updateClouds();

  // Crossed the finish line? The WHOLE finish cliff counts — touch it at any
  // height (as long as you haven't fallen into the ravine) and you're through.
  if (p.x >= level.endCliffX && p.y < VH){
    if (level.boss && !level.bossDone){ enterBoss(); return; }
    p.x=level.endCliffX; p.y=CLIFF_TOP-STAND_DY; p.mode='stand'; p.vx=p.vy=0;
    game.state=S.CLEAR; game.timer=55; blip(880,0.1); blip(1120,0.12);
    for (let i=0;i<24;i++) spawnSpark(p.x, p.y-20, '#ffe27a'); return;
  }
  // Safe landing back on the start cliff.
  if (p.x < CLIFF_W && p.mode!=='swing' && p.y >= CLIFF_TOP-STAND_DY && p.vy>=0){ p.y=CLIFF_TOP-STAND_DY; p.vy=0; p.vx*=0.5; p.mode='stand'; }
  if (p.y > VH+80) loseLife('fall');
}

function throwBanana(m, p){
  const dx=(p.x+p.vx*8)-m.x, dy=p.y-m.y, ang=Math.atan2(dy-60,dx);
  bananas.push({ x:m.x, y:m.y-10, vx:Math.cos(ang)*m.speed, vy:Math.sin(ang)*m.speed-2, spin:0, dead:false });
  blip(240,0.04);
}

/* ============================================================================
   GORILLA BOSS  —  arena at the end of every 3rd level.
   Draw in screen coords (camX ignored). Full-width floor, two vines to swing
   on. Whack the gorilla with the pan; helper monkeys (one per mini-sausage)
   pelt it with bananas. Dodge barrels and coconuts.
   ========================================================================== */
const BOSS_FLOOR = CLIFF_TOP;
const BOSS_STAND = BOSS_FLOOR - STAND_DY;   // player's feet-on-floor y
function enterBoss(){
  game.state = S.BOSS; game.arena = true; game.camX = 0; game.timer = 0;
  const tier = level.n / 3;                       // 1,2,3...
  const hp = 6 + (tier-1)*4;
  boss = {
    g: { x:VW-84, y:BOSS_FLOOR, hp, maxhp:hp, iframe:0, cd:110, beatCd:230, anim:0, hurt:0 },
    helpers: [], barrels: [], cocos: [], fban: [], intro: 160,
  };
  const helperN = Math.min(game.coins, HELPER_CAP);
  for (let i=0;i<helperN;i++) boss.helpers.push({ x:22+i*26, y:BOSS_FLOOR, cd:40+i*14, bob:i });
  // Swingable vines across the arena — tap one to swing in at the gorilla.
  anchors = [ {x:VW*0.26, y:150}, {x:VW*0.44, y:120}, {x:VW*0.62, y:120}, {x:VW*0.80, y:150} ];
  bananas = []; coconuts = []; particles = []; floatTexts = [];
  player.x = 60; player.y = BOSS_STAND; player.vx=0; player.vy=0; player.mode='stand'; player.onGround=true; player.curA=null; player.iframe=60;
  grappleId = null; pointers.clear(); pointerBtn.clear(); recomputeBtns();
  blip(90,0.4,'sawtooth'); game.shake = 18;
}
function updateBoss(){
  if (game.shake>0.5) game.shake*=0.86; else game.shake=0;
  if (game.panMsg>0) game.panMsg--;
  const p = player, b = boss, g = b.g;
  if (b.intro > 0) b.intro--;

  // ---- Movement: swing on a vine, or walk/jump with the D-pad ----
  if (p.mode === 'swing'){
    integrate(p);                                // pendulum + two-finger climb
    p.onGround = false; p.face = 'happy';
    if (p.y < 24){ p.y = 24; }
    p.x = clamp(p.x, 16, VW-16);
  } else {
    const target = bossBtn.left ? -WALK : bossBtn.right ? WALK : 0;
    // On the ground, walk; in the air keep swing momentum unless steering.
    if (p.onGround || bossBtn.left || bossBtn.right) p.vx += (target - p.vx) * (p.onGround ? 0.35 : 0.10);
    p.vy += BG;
    p.x += p.vx; p.y += p.vy;
    p.onGround = false;
    if (p.y >= BOSS_STAND && p.vy >= 0){ p.y = BOSS_STAND; p.vy = 0; p.onGround = true; }
    if (p.y < 24){ p.y = 24; if (p.vy < 0) p.vy = 0; }   // ceiling — never off the top
    p.x = clamp(p.x, 16, VW-16);
    p.mode = p.onGround ? 'stand' : 'fly';
    p.legPh += Math.abs(p.vx) * 0.06 + 0.05;
    p.face = p.onGround ? 'happy' : 'ooh';
    if (p.iframe > 0) p.iframe--;
  }

  if (g.iframe>0) g.iframe--;
  if (g.hurt>0) g.hurt--;
  g.anim += 0.05;

  if (b.intro <= 0 && g.hp > 0){
    // Hit the gorilla: walk/jump into it with the pan, or bop its head if you
    // missed the pan. Either way you get knocked back so you re-approach.
    if (g.iframe<=0){
      const near = Math.abs(p.x-g.x) < 46;
      const panHit  = game.armed && near && p.y > g.y-118 && p.y < g.y+8;
      const headBop = !game.armed && !p.onGround && p.vy > 0.4 && Math.abs(p.x-g.x) < 36 && p.y < g.y-60 && p.y > g.y-120;
      if (panHit || headBop){
        g.hp--; g.iframe=26; g.hurt=18; game.shake=14; blip(320,0.09,'square');
        spawnText(g.x, g.y-96, panHit?'WHACK!':'BONK!', '#fff'); for(let i=0;i<12;i++) spawnSpark(g.x,g.y-50,'#ffe27a');
        if (p.mode==='swing'){ p.mode='fly'; grappleId=null; }   // let go on impact
        if (panHit){ p.vx = Math.sign(p.x-g.x||-1)*7; p.vy = -6; p.onGround=false; } else { p.vy = -JUMP_V*0.9; }
        p.iframe=16;
      }
    }
    // Gorilla attacks: rolling barrels + a gentler chest-beat coconut shower.
    if (--g.cd <= 0){ g.cd = Math.max(105, 165 - level.n*2); g.anim = 0;
      b.barrels.push({ x:g.x-30, y:BOSS_FLOOR-14, vx:-(2.4+Math.random()*1.1), spin:0 }); blip(160,0.1,'sawtooth'); }
    if (--g.beatCd <= 0){ g.beatCd = 360; game.shake=10; blip(120,0.2,'sawtooth');
      const nc = 2 + (level.n>=6?1:0); for (let i=0;i<nc;i++) b.cocos.push({ x:40+Math.random()*(VW-80), y:-20-Math.random()*40, vy:0.5+Math.random()*0.8 }); }
    // Helper monkeys pelt the gorilla — aimed straight at its chest so they land.
    for (const h of b.helpers){ h.bob += 0.1;
      if (--h.cd <= 0){ h.cd = 70 + Math.random()*40;
        const sx=h.x+8, sy=BOSS_FLOOR-24, tx=g.x, ty=g.y-46, d=Math.hypot(tx-sx,ty-sy)||1;
        b.fban.push({ x:sx, y:sy, vx:(tx-sx)/d*7.5, vy:(ty-sy)/d*7.5, spin:0 }); } }
  }

  // Barrels roll along the floor — jump over them (they hit only when your feet
  // are near the ground).
  for (const bar of b.barrels){ bar.x += bar.vx; bar.spin += 0.28;
    const feet = p.y + 55;
    if (p.iframe<=0 && Math.abs(bar.x-p.x) < p.r+15 && feet > BOSS_FLOOR-24){ bar.dead=true; loseLife('barrel'); }
    if (bar.x < -40) bar.dead=true; }
  b.barrels = b.barrels.filter(x=>!x.dead);
  // Falling coconuts — slow and dodgeable.
  for (const c of b.cocos){ c.vy += BG*0.28; if (c.vy > 4.2) c.vy = 4.2; c.y += c.vy;
    if (p.iframe<=0 && Math.hypot(c.x-p.x, c.y-p.y) < p.r+13){ c.dead=true; loseLife('coconut'); }
    if (c.y > VH+40) c.dead=true; }
  b.cocos = b.cocos.filter(c=>!c.dead);
  // Friendly bananas damage the gorilla (fly straight, generous hitbox).
  for (const f of b.fban){ f.x += f.vx; f.y += f.vy; f.spin += 0.3;
    if (g.iframe<=0 && g.hp>0 && Math.hypot(f.x-g.x, f.y-(g.y-46)) < 42){ f.dead=true; g.hp--; g.iframe=8; g.hurt=10; spawnText(g.x,g.y-72,'-1','#ffd27a'); blip(400,0.05); }
    if (f.x > VW+40 || f.x < -40 || f.y > VH+40 || f.y < -40) f.dead=true; }
  b.fban = b.fban.filter(f=>!f.dead);

  updateParticles();

  if (game.state === S.BOSS && g.hp <= 0){
    game.state = S.BOSSWIN; game.timer = 90; game.shake = 20;
    blip(700,0.15); blip(900,0.18); blip(1200,0.25);
    for (let i=0;i<40;i++) spawnSpark(g.x, g.y-40, '#ffe27a');
  }
}

/* ---------- Particles / text ---------- */
function updateParticles(){
  for (const q of particles){ q.vy += 0.3; q.x += q.vx; q.y += q.vy; q.life--; }
  particles = particles.filter(q=>q.life>0);
  for (const f of floatTexts){ f.y += f.vy; f.vy *= 0.94; f.life--; }
  floatTexts = floatTexts.filter(f=>f.life>0);
}
function spawnSplat(x,y,col){ for(let i=0;i<16;i++){ const a=Math.random()*6.28,s=1+Math.random()*5; particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-2,life:30+Math.random()*20,col,r:2+Math.random()*3}); } }
function spawnSpark(x,y,col){ const a=Math.random()*6.28,s=1+Math.random()*3; particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-1,life:24,col,r:2}); }
function spawnText(x,y,txt,col){ floatTexts.push({x,y,vy:-1.6,life:48,txt,col:col||'#fff'}); }

function makeClouds(){ const c=[]; for(let i=0;i<8;i++) c.push({x:Math.random()*3000,y:40+Math.random()*220,s:0.6+Math.random()*0.9,sp:0.1+Math.random()*0.2}); return c; }
function updateClouds(){ for(const c of clouds){ c.x-=c.sp; if(c.x<-200) c.x+=3400; } }

/* ============================================================================
   RENDER
   ========================================================================== */
function render(){
  ctx.setTransform(dpr,0,0,dpr,0,0);
  const W=cvs.width/dpr, H=cvs.height/dpr;
  const sky=ctx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,'#79c6e8'); sky.addColorStop(0.7,'#bfe9f5'); sky.addColorStop(1,'#e9f8ef');
  ctx.fillStyle=sky; ctx.fillRect(0,0,W,H);

  const sh=game.shake>0.5?game.shake:0, shx=sh?(Math.random()*2-1)*sh:0, shy=sh?(Math.random()*2-1)*sh:0;
  ctx.setTransform(scale*dpr,0,0,scale*dpr,(offX+shx)*dpr,(offY+shy)*dpr);
  ctx.save(); ctx.beginPath(); ctx.rect(0,0,VW,VH); ctx.clip();

  if (game.state === S.BOSS || game.state === S.BOSSWIN){ renderBoss(); }
  else {
    drawParallax();
    ctx.save(); ctx.translate(-game.camX,0); drawWorld(); ctx.restore();
  }
  drawHUD();
  ctx.restore();
  drawOverlays();
}

function drawParallax(){
  ctx.fillStyle='rgba(255,244,190,0.9)'; ctx.beginPath(); ctx.arc(VW-70,90,46,0,6.29); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.85)';
  for(const c of clouds){ const x=c.x-game.camX*0.3, xx=((x%(VW+400))+(VW+400))%(VW+400)-200; cloud(xx,c.y,34*c.s); }
  hills(-game.camX*0.4, CLIFF_TOP+40, 0.6, '#8fd08a');
  hills(-game.camX*0.55+140, CLIFF_TOP+68, 0.8, '#79c47a');
}
function cloud(x,y,r){ ctx.beginPath(); ctx.arc(x,y,r,0,6.29); ctx.arc(x+r,y+6,r*0.8,0,6.29); ctx.arc(x-r,y+6,r*0.8,0,6.29); ctx.arc(x+r*0.4,y-r*0.5,r*0.7,0,6.29); ctx.fill(); }
function hills(off,y,amp,col){ ctx.fillStyle=col; ctx.beginPath(); ctx.moveTo(0,VH);
  for(let x=-100;x<=VW+100;x+=40){ const yy=y+Math.sin((x-off)*0.01)*30*amp+Math.sin((x-off)*0.03)*10*amp; ctx.lineTo(x,yy); }
  ctx.lineTo(VW,VH); ctx.closePath(); ctx.fill(); }

function drawWorld(){
  const rav=ctx.createLinearGradient(0,CLIFF_TOP,0,VH); rav.addColorStop(0,'rgba(40,70,60,0)'); rav.addColorStop(1,'rgba(20,40,35,0.55)');
  ctx.fillStyle=rav; ctx.fillRect(game.camX,CLIFF_TOP,VW,VH-CLIFF_TOP);
  for(const t of trees) drawTree(t);
  for(const c of coins) if(!c.got) drawCoin(c.x, c.y+Math.sin(c.bob)*5);
  if(pan && !pan.got) drawPan(pan.x, pan.y+Math.sin(pan.bob)*6);
  drawCliff(0,CLIFF_W,true); drawCliff(level.endCliffX,CLIFF_W,false); drawFinishLine(level.endCliffX);
  for(const m of monkeys) if(m.alive) drawMonkey(m.x,m.y);
  for(const s of spikes) drawSpike(s.x, s.y);
  for(const b of birds) drawBird(b);
  for(const c of coconuts) drawCoconut(c.x,c.y);
  for(const b of bananas) drawBanana(b.x,b.y,b.spin);
  drawPlayer(player);
  drawParticles();
}
function drawParticles(){
  for(const q of particles){ ctx.fillStyle=q.col; ctx.globalAlpha=clamp(q.life/40,0,1); ctx.beginPath(); ctx.arc(q.x,q.y,q.r,0,6.29); ctx.fill(); }
  ctx.globalAlpha=1;
  for(const f of floatTexts){ ctx.globalAlpha=clamp(f.life/48,0,1); ctx.fillStyle=f.col; ctx.font='bold 22px system-ui'; ctx.textAlign='center'; ctx.fillText(f.txt,f.x,f.y); }
  ctx.globalAlpha=1;
}

function drawCliff(x,w,isStart){
  const top=CLIFF_TOP;
  ctx.fillStyle='#9a8b76'; ctx.fillRect(x,top,w,VH-top);
  ctx.fillStyle='rgba(0,0,0,0.12)'; ctx.fillRect(x,top+18,w,VH-top);
  ctx.fillStyle='#57b94f'; ctx.fillRect(x,top-10,w,18);
  ctx.fillStyle='#66cf5c'; for(let gx=x+4;gx<x+w;gx+=12){ ctx.beginPath(); ctx.moveTo(gx,top-10); ctx.lineTo(gx+4,top-20); ctx.lineTo(gx+8,top-10); ctx.fill(); }
}
// The whole finish cliff is the goal — a bold checkerboard line marks it so it's
// obvious that touching ANY of it clears the level.
function drawFinishLine(x){
  const sq=15, topY=90;
  // checkered band running the full height, right at the finish edge
  for(let yy=topY; yy<VH; yy+=sq){
    const row=Math.floor((yy-topY)/sq);
    for(let i=0;i<2;i++){
      ctx.fillStyle=((row+i)%2===0)?'#20242b':'#f6f6f6';
      ctx.fillRect(x-sq+i*sq, yy, sq, sq);
    }
  }
  // pole + waving checkered flag on top
  ctx.fillStyle='#6b5330'; ctx.fillRect(x-2, 40, 4, topY-40);
  const wav=Math.sin(game.t*0.12)*4;
  for(let r=0;r<3;r++) for(let cc=0;cc<4;cc++){
    ctx.fillStyle=((r+cc)%2===0)?'#20242b':'#f6f6f6';
    ctx.fillRect(x+2+cc*11, 42+r*10+ (cc*wav*0.4), 11, 10);
  }
  // little "FINISH" tag
  ctx.fillStyle='#20242b'; ctx.font='bold 13px system-ui'; ctx.textAlign='center';
  ctx.save(); ctx.translate(x+2, 128); ctx.fillStyle='rgba(255,255,255,0.9)';
  roundRect(-30,-14,60,20,6); ctx.fill(); ctx.fillStyle='#20242b'; ctx.fillText('FINISH',0,0); ctx.restore();
}
function drawTree(t){
  const sway=Math.sin(game.t*0.02+t.sway)*4;
  ctx.strokeStyle='#6b4a2f'; ctx.lineWidth=t.w; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(t.x,VH+20); ctx.quadraticCurveTo(t.x-6,(VH+t.top)/2,t.x+sway,t.top); ctx.stroke();
  ctx.lineWidth=7; ctx.beginPath(); ctx.moveTo(t.x,t.top+50); ctx.lineTo(t.x-30,t.top+30); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(t.x,t.top+80); ctx.lineTo(t.x+34,t.top+58); ctx.stroke();
  const fx=t.x+sway, fy=t.top, fol=(cx,cy,r,c)=>{ctx.fillStyle=c;ctx.beginPath();ctx.arc(cx,cy,r,0,6.29);ctx.fill();};
  fol(fx-24,fy-6,30,'#2f8f3e'); fol(fx+24,fy-6,30,'#2f8f3e'); fol(fx,fy-30,34,'#3fa34d'); fol(fx-10,fy+6,26,'#37953f'); fol(fx+14,fy+2,24,'#43ad51');
  if(t.coconut){ ctx.fillStyle='#5a3d22'; ctx.beginPath(); ctx.arc(fx-12,fy+14,6,0,6.29); ctx.arc(fx+8,fy+16,6,0,6.29); ctx.fill(); }
  // grab knob (highlighted so kids can see where to tap)
  ctx.fillStyle='rgba(60,40,25,0.85)'; ctx.beginPath(); ctx.arc(t.x+sway,t.top,6,0,6.29); ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.5)'; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(t.x+sway,t.top,9,0,6.29); ctx.stroke();
}

function drawPlayer(p){
  if(p.mode==='swing'){ ctx.strokeStyle='#efe6c8'; ctx.lineWidth=3; ctx.lineCap='round'; ctx.beginPath(); ctx.moveTo(p.ax,p.ay); ctx.lineTo(p.x,p.y-6); ctx.stroke(); }
  let ang = p.mode==='swing' ? Math.atan2(p.y-p.ay,p.x-p.ax)-Math.PI/2 : p.mode==='fly' ? Math.atan2(p.vy,p.vx) : 0;
  ctx.save(); ctx.translate(p.x,p.y);
  if(p.iframe>0 && Math.floor(game.t/4)%2===0) ctx.globalAlpha=0.5;
  ctx.rotate(p.mode==='stand'?0:clamp(ang,-1.2,1.2)*0.5);
  const bodyLen=46, bodyR=15;
  ctx.strokeStyle='#c76b39'; ctx.lineWidth=4; ctx.lineCap='round';
  const legSw=Math.sin(p.legPh)*6+(p.mode==='fly'?8:0);
  limb(-4,bodyR+2,-10-legSw*0.3,bodyR+26,-8,bodyR+40); limb(6,bodyR+2,12+legSw*0.3,bodyR+26,14,bodyR+40);
  const grad=ctx.createLinearGradient(-bodyR,0,bodyR,0); grad.addColorStop(0,'#c76b39'); grad.addColorStop(0.5,'#e0824a'); grad.addColorStop(1,'#c76b39');
  ctx.fillStyle=grad; ctx.strokeStyle='#a4531f'; ctx.lineWidth=3; capsulePath(0,0,bodyR,bodyLen); ctx.fill(); ctx.stroke();
  ctx.strokeStyle='rgba(140,70,30,0.5)'; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(-bodyR+3,-6); ctx.quadraticCurveTo(0,-2,bodyR-3,-6); ctx.stroke();
  ctx.strokeStyle='#c76b39'; ctx.lineWidth=4;
  if(p.mode==='swing'){ limb(-8,-bodyLen*0.28,-6,-bodyLen*0.55,0,-bodyLen*0.7); limb(8,-bodyLen*0.28,6,-bodyLen*0.55,0,-bodyLen*0.7); }
  else { const a=Math.sin(p.legPh*1.3)*10; limb(-8,-bodyLen*0.25,-18,-bodyLen*0.4-a,-22,-bodyLen*0.3-a); limb(8,-bodyLen*0.25,18,-bodyLen*0.4+a,22,-bodyLen*0.3+a); }
  drawFace(0,-bodyLen*0.34,p.face);
  if(game.armed){ ctx.save(); ctx.translate(14,-bodyLen*0.3); ctx.rotate(-0.5); panIcon(0,0,0.8); ctx.restore(); }
  ctx.restore();
}
function limb(x1,y1,x2,y2,x3,y3){ ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.lineTo(x3,y3); ctx.stroke(); ctx.fillStyle='#7a3d16'; ctx.beginPath(); ctx.arc(x3,y3,3.2,0,6.29); ctx.fill(); }
function capsulePath(cx,cy,r,len){ const h=len/2; ctx.beginPath(); ctx.moveTo(cx-r,cy-h+r); ctx.arc(cx,cy-h+r,r,Math.PI,0); ctx.lineTo(cx+r,cy+h-r); ctx.arc(cx,cy+h-r,r,0,Math.PI); ctx.closePath(); }
function drawFace(x,y,mood){
  ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(x-6,y,5,0,6.29); ctx.arc(x+6,y,5,0,6.29); ctx.fill();
  ctx.fillStyle='#222'; const look=mood==='worried'?1.5:0; ctx.beginPath(); ctx.arc(x-6,y+look,2.4,0,6.29); ctx.arc(x+6,y+look,2.4,0,6.29); ctx.fill();
  ctx.strokeStyle='#3a1e0d'; ctx.lineWidth=2; ctx.lineCap='round'; ctx.beginPath();
  if(mood==='happy'){ ctx.moveTo(x-8,y+9); ctx.quadraticCurveTo(x,y+15,x+8,y+9); }
  else if(mood==='ooh'){ ctx.arc(x,y+11,3.2,0,6.29); }
  else { ctx.moveTo(x-7,y+12); ctx.quadraticCurveTo(x,y+7,x+7,y+12); }
  ctx.stroke();
  ctx.fillStyle='rgba(255,120,90,0.35)'; ctx.beginPath(); ctx.arc(x-11,y+5,3,0,6.29); ctx.arc(x+11,y+5,3,0,6.29); ctx.fill();
}
function drawMonkey(mx,my){
  ctx.save(); ctx.translate(mx,my-14+Math.sin(game.t*0.1)*2);
  ctx.strokeStyle='#6b4a2f'; ctx.lineWidth=4; ctx.lineCap='round'; ctx.beginPath(); ctx.moveTo(6,6); ctx.quadraticCurveTo(22,4,20,-12); ctx.stroke();
  ctx.fillStyle='#7a5334'; ctx.beginPath(); ctx.ellipse(0,4,12,14,0,0,6.29); ctx.fill(); ctx.beginPath(); ctx.arc(0,-12,11,0,6.29); ctx.fill();
  ctx.fillStyle='#d9b892'; ctx.beginPath(); ctx.ellipse(0,-9,7,8,0,0,6.29); ctx.fill();
  ctx.fillStyle='#7a5334'; ctx.beginPath(); ctx.arc(-11,-14,4.5,0,6.29); ctx.arc(11,-14,4.5,0,6.29); ctx.fill();
  ctx.fillStyle='#222'; ctx.beginPath(); ctx.arc(-3,-12,1.8,0,6.29); ctx.arc(3,-12,1.8,0,6.29); ctx.fill();
  ctx.restore();
}
function drawBird(b){
  ctx.save(); ctx.translate(b.x,b.y); if(b.vx<0) ctx.scale(-1,1);
  const f=Math.sin(b.flap)*10;
  ctx.fillStyle='#4a4a55'; ctx.beginPath(); ctx.ellipse(0,0,12,7,0,0,6.29); ctx.fill();
  ctx.strokeStyle='#4a4a55'; ctx.lineWidth=4; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(-2,-2); ctx.lineTo(-14,-8-f); ctx.stroke(); ctx.beginPath(); ctx.moveTo(2,-2); ctx.lineTo(14,-8-f); ctx.stroke();
  ctx.fillStyle='#ffb03a'; ctx.beginPath(); ctx.moveTo(11,-1); ctx.lineTo(18,1); ctx.lineTo(11,3); ctx.fill();
  ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(6,-2,2,0,6.29); ctx.fill(); ctx.fillStyle='#222'; ctx.beginPath(); ctx.arc(6.6,-2,1,0,6.29); ctx.fill();
  ctx.restore();
}
function drawSpike(x,y){   // a spiky metal block floating in the sky
  ctx.save(); ctx.translate(x,y); ctx.rotate(Math.sin(game.t*0.03)*0.05);
  ctx.fillStyle='#8a929c';
  const sp=8; // spikes around a square
  for(let a=0;a<8;a++){ const an=a/8*6.28; ctx.save(); ctx.rotate(an); ctx.beginPath(); ctx.moveTo(-6,-14); ctx.lineTo(0,-24); ctx.lineTo(6,-14); ctx.fill(); ctx.restore(); }
  ctx.fillStyle='#6a727c'; roundRect(-15,-15,30,30,5); ctx.fill();
  ctx.fillStyle='#565d66'; ctx.beginPath(); ctx.arc(0,0,7,0,6.29); ctx.fill();
  ctx.fillStyle='#3a4048'; ctx.beginPath(); ctx.arc(-4,-4,1.6,0,6.29); ctx.arc(4,-4,1.6,0,6.29); ctx.fill();  // grumpy eyes
  ctx.restore();
}
function drawCoconut(x,y){ ctx.save(); ctx.translate(x,y); ctx.fillStyle='#6b4423'; ctx.beginPath(); ctx.arc(0,0,12,0,6.29); ctx.fill(); ctx.fillStyle='#4a2f18'; ctx.beginPath(); ctx.arc(-3,-3,2,0,6.29); ctx.arc(3,-2,2,0,6.29); ctx.arc(0,3,2,0,6.29); ctx.fill(); ctx.restore(); }
function drawBanana(x,y,spin){ ctx.save(); ctx.translate(x,y); ctx.rotate(spin); ctx.fillStyle='#ffd23f'; ctx.strokeStyle='#c99a00'; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(-8,4); ctx.quadraticCurveTo(0,-10,10,2); ctx.quadraticCurveTo(2,2,-8,4); ctx.fill(); ctx.stroke(); ctx.restore(); }
function drawCoin(x,y){   // a shiny mini-sausage
  ctx.save(); ctx.translate(x,y);
  ctx.strokeStyle='rgba(255,240,150,0.7)'; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(0,0,16+Math.sin(game.t*0.15)*2,0,6.29); ctx.stroke();
  ctx.rotate(0.5); ctx.fillStyle='#e0824a'; ctx.strokeStyle='#a4531f'; ctx.lineWidth=2.5; capsulePath(0,0,7,18); ctx.fill(); ctx.stroke();
  ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(-2,-3,1.4,0,6.29); ctx.arc(2,-3,1.4,0,6.29); ctx.fill();
  ctx.strokeStyle='#3a1e0d'; ctx.lineWidth=1.2; ctx.beginPath(); ctx.moveTo(-2.5,1); ctx.quadraticCurveTo(0,3,2.5,1); ctx.stroke();
  ctx.restore();
}
function drawPan(x,y){ ctx.save(); ctx.translate(x,y); ctx.strokeStyle='rgba(255,240,150,0.8)'; ctx.lineWidth=3; ctx.beginPath(); ctx.arc(0,0,24+Math.sin(game.t*0.15)*3,0,6.29); ctx.stroke(); panIcon(0,0,1.15); ctx.restore(); }
function panIcon(x,y,s){ ctx.save(); ctx.translate(x,y); ctx.scale(s,s); ctx.strokeStyle='#333'; ctx.lineWidth=4; ctx.lineCap='round'; ctx.beginPath(); ctx.moveTo(9,2); ctx.lineTo(22,8); ctx.stroke(); ctx.fillStyle='#3a3a3a'; ctx.beginPath(); ctx.arc(0,0,12,0,6.29); ctx.fill(); ctx.fillStyle='#565656'; ctx.beginPath(); ctx.arc(0,0,8,0,6.29); ctx.fill(); ctx.restore(); }

/* ---------- Boss arena render ---------- */
function renderBoss(){
  // jungle backdrop
  hills(120, CLIFF_TOP+30, 0.7, '#8fd08a'); hills(260, CLIFF_TOP+60, 0.9, '#79c47a');
  ctx.fillStyle='rgba(255,255,255,0.8)'; cloud(90,90,30); cloud(330,60,26);
  // swingable vines — tap one to swing in at the gorilla
  for(const a of anchors){ ctx.strokeStyle='#3fa34d'; ctx.lineWidth=7; ctx.lineCap='round'; ctx.beginPath(); ctx.moveTo(a.x,0);
    for(let y=0;y<a.y;y+=18){ ctx.lineTo(a.x+Math.sin(y*0.05+game.t*0.02)*5, y); } ctx.lineTo(a.x,a.y); ctx.stroke();
    ctx.fillStyle='#2f8f3e'; ctx.beginPath(); ctx.arc(a.x,a.y-10,12,0,6.29); ctx.fill();
    ctx.fillStyle='rgba(60,40,25,0.85)'; ctx.beginPath(); ctx.arc(a.x,a.y,6,0,6.29); ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.5)'; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(a.x,a.y,9,0,6.29); ctx.stroke(); }
  // floor
  ctx.fillStyle='#9a8b76'; ctx.fillRect(0,BOSS_FLOOR,VW,VH-BOSS_FLOOR);
  ctx.fillStyle='rgba(0,0,0,0.12)'; ctx.fillRect(0,BOSS_FLOOR+18,VW,VH);
  ctx.fillStyle='#57b94f'; ctx.fillRect(0,BOSS_FLOOR-10,VW,16);
  // helper monkeys
  for(const h of boss.helpers) drawMonkey(h.x, h.y-2+Math.sin(h.bob)*2);
  // gorilla
  drawGorilla(boss.g);
  // projectiles
  for(const bar of boss.barrels) drawBarrel(bar.x,bar.y,bar.spin);
  for(const c of boss.cocos) drawCoconut(c.x,c.y);
  for(const f of boss.fban) drawBanana(f.x,f.y,f.spin);
  drawPlayer(player);
  drawParticles();
  // boss HP bar
  const g=boss.g, bw=VW-80, hpf=Math.max(0,g.hp/g.maxhp);
  ctx.fillStyle='rgba(0,0,0,0.35)'; roundRect(40,74,bw,16,8); ctx.fill();
  ctx.fillStyle='#ff5252'; roundRect(40,74,bw*hpf,16,8); ctx.fill();
  ctx.fillStyle='#fff'; ctx.font='bold 13px system-ui'; ctx.textAlign='center'; ctx.fillText('GORILLA BOSS',VW/2,87);
  // On-screen D-pad.
  drawDpad();
  if(boss.intro>0){ ctx.globalAlpha=clamp(boss.intro/160,0,1); ctx.fillStyle='#fff'; ctx.font='bold 25px system-ui'; ctx.strokeStyle='#7a3d16'; ctx.lineWidth=5; ctx.textAlign='center';
    const msg = game.armed ? 'Whack it with the pan!' : 'No pan — jump on its head!';
    ctx.strokeText(msg,VW/2,VH*0.28); ctx.fillText(msg,VW/2,VH*0.28);
    ctx.font='bold 15px system-ui'; const sub = boss.helpers.length ? ('Your '+boss.helpers.length+' monkey pals are helping!') : 'Tip: collect 🌭 for monkey helpers';
    ctx.fillText(sub,VW/2,VH*0.28+26);
    ctx.font='bold 14px system-ui'; ctx.fillText('◀ ▶ walk   ⤒ jump   tap a vine to swing',VW/2,VH*0.28+50); ctx.globalAlpha=1; }
}
function drawDpad(){
  const btn=(b,draw)=>{ const held=(b===BTN.left&&bossBtn.left)||(b===BTN.right&&bossBtn.right);
    ctx.fillStyle=held?'rgba(255,255,255,0.5)':'rgba(255,255,255,0.28)'; ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,6.29); ctx.fill();
    ctx.strokeStyle='rgba(30,40,35,0.5)'; ctx.lineWidth=3; ctx.stroke();
    ctx.fillStyle='rgba(30,50,42,0.85)'; draw(b); };
  btn(BTN.left,b=>{ ctx.beginPath(); ctx.moveTo(b.x+11,b.y-16); ctx.lineTo(b.x-13,b.y); ctx.lineTo(b.x+11,b.y+16); ctx.fill(); });
  btn(BTN.right,b=>{ ctx.beginPath(); ctx.moveTo(b.x-11,b.y-16); ctx.lineTo(b.x+13,b.y); ctx.lineTo(b.x-11,b.y+16); ctx.fill(); });
  btn(BTN.jump,b=>{ ctx.beginPath(); ctx.moveTo(b.x,b.y-18); ctx.lineTo(b.x-15,b.y+6); ctx.lineTo(b.x+15,b.y+6); ctx.fill();
    ctx.font='bold 12px system-ui'; ctx.textAlign='center'; ctx.fillText('JUMP',b.x,b.y+20); });
}
function drawGorilla(g){
  ctx.save(); ctx.translate(g.x, g.y);
  if(g.hurt>0 && Math.floor(game.t/3)%2===0) ctx.globalAlpha=0.6;
  const bob=Math.sin(g.anim)*3, arm=Math.max(0,Math.sin(g.anim*2))*10;
  ctx.fillStyle='#3b3b45';
  // legs
  ctx.beginPath(); ctx.ellipse(-16,-6,11,14,0,0,6.29); ctx.ellipse(16,-6,11,14,0,0,6.29); ctx.fill();
  // body
  ctx.beginPath(); ctx.ellipse(0,-48+bob,34,38,0,0,6.29); ctx.fill();
  ctx.fillStyle='#5a5a68'; ctx.beginPath(); ctx.ellipse(0,-42+bob,20,26,0,0,6.29); ctx.fill();
  // arms
  ctx.fillStyle='#3b3b45'; ctx.lineWidth=0;
  ctx.beginPath(); ctx.ellipse(-40,-40+bob-arm,10,26,0.2,0,6.29); ctx.fill();
  ctx.beginPath(); ctx.ellipse(40,-40+bob-arm,10,26,-0.2,0,6.29); ctx.fill();
  // head
  ctx.beginPath(); ctx.ellipse(0,-92+bob,24,22,0,0,6.29); ctx.fill();
  ctx.fillStyle='#6a6a78'; ctx.beginPath(); ctx.ellipse(0,-86+bob,15,13,0,0,6.29); ctx.fill();
  // face
  ctx.fillStyle='#1e1e26'; ctx.beginPath(); ctx.arc(-7,-92+bob,3,0,6.29); ctx.arc(7,-92+bob,3,0,6.29); ctx.fill();
  ctx.fillStyle='#c98a5a'; ctx.beginPath(); ctx.ellipse(0,-82+bob,7,4,0,0,6.29); ctx.fill();
  // angry brow
  ctx.strokeStyle='#1e1e26'; ctx.lineWidth=3; ctx.beginPath(); ctx.moveTo(-12,-98+bob); ctx.lineTo(-3,-95+bob); ctx.moveTo(12,-98+bob); ctx.lineTo(3,-95+bob); ctx.stroke();
  ctx.restore();
}
function drawBarrel(x,y,spin){ ctx.save(); ctx.translate(x,y); ctx.rotate(spin); ctx.fillStyle='#8a5a2b'; roundRect(-14,-11,28,22,6); ctx.fill(); ctx.strokeStyle='#5e3d1c'; ctx.lineWidth=3; ctx.beginPath(); ctx.moveTo(-14,-4); ctx.lineTo(14,-4); ctx.moveTo(-14,4); ctx.lineTo(14,4); ctx.stroke(); ctx.restore(); }

/* ---------- HUD ---------- */
function drawHUD(){
  // lives (mini sausages)
  for(let i=0;i<START_LIVES;i++){ const x=20+i*23,y=32; ctx.globalAlpha=i<game.lives?1:0.22; ctx.save(); ctx.translate(x,y); ctx.scale(0.42,0.42);
    ctx.fillStyle='#e0824a'; ctx.strokeStyle='#a4531f'; ctx.lineWidth=4; capsulePath(0,0,15,40); ctx.fill(); ctx.stroke(); drawFace(0,-8,'happy'); ctx.restore(); ctx.globalAlpha=1; }
  // level + score
  ctx.fillStyle='#1e3a2e'; ctx.textAlign='right'; ctx.font='bold 26px system-ui'; ctx.fillText('LVL '+game.level,VW-16,34);
  ctx.font='bold 15px system-ui'; ctx.fillStyle='#2a4a3a'; ctx.fillText('Cleared: '+game.score+'   Best: '+game.best,VW-16,55);
  // coin counter (mini-sausage)
  ctx.save(); ctx.translate(30,68); ctx.scale(0.7,0.7); ctx.rotate(0.5); ctx.fillStyle='#e0824a'; ctx.strokeStyle='#a4531f'; ctx.lineWidth=3; capsulePath(0,0,7,18); ctx.fill(); ctx.stroke(); ctx.restore();
  ctx.textAlign='left'; ctx.fillStyle='#1e3a2e'; ctx.font='bold 16px system-ui'; ctx.fillText('x '+game.coins,42,74);
  // armed
  if(game.armed && game.state!==S.BOSS){ ctx.save(); ctx.translate(VW-28,80); panIcon(0,0,0.85); ctx.restore(); ctx.textAlign='right'; ctx.fillStyle='#1e3a2e'; ctx.font='bold 13px system-ui'; ctx.fillText('armed!',VW-44,84); }
  // progress bar (normal levels)
  if(game.state===S.PLAY){ const prog=clamp((player.x-CLIFF_W)/(level.endCliffX-CLIFF_W),0,1);
    ctx.fillStyle='rgba(0,0,0,0.15)'; roundRect(120,VH-24,VW-140,8,4); ctx.fill();
    ctx.fillStyle='#57b94f'; roundRect(120,VH-24,(VW-140)*prog,8,4); ctx.fill();
    ctx.save(); ctx.translate(120+(VW-140)*prog,VH-20); ctx.scale(0.28,0.28); ctx.fillStyle='#e0824a'; capsulePath(0,0,15,40); ctx.fill(); ctx.restore();
    if(level.boss){ ctx.fillStyle='#3b3b45'; ctx.font='16px system-ui'; ctx.textAlign='right'; ctx.fillText('🦍',VW-14,VH-16); } }
  // pan toast
  if(game.panMsg>0){ ctx.globalAlpha=clamp(game.panMsg/40,0,1); ctx.textAlign='center'; ctx.fillStyle='#1e3a2e'; ctx.font='bold 18px system-ui'; ctx.fillText('🍳 Frying pan! Save it for the gorilla',VW/2,VH*0.24); ctx.globalAlpha=1; }
  // level-1 control hint
  if(game.hint>0 && game.state===S.PLAY){ ctx.globalAlpha=clamp(game.hint/60,0,1); ctx.textAlign='center'; ctx.fillStyle='#1e3a2e'; ctx.font='bold 17px system-ui';
    ctx.fillText('👆 Tap a treetop to grab it',VW/2,VH*0.30); ctx.font='14px system-ui'; ctx.fillText('Let go to fly • Shake to swing higher',VW/2,VH*0.335); ctx.globalAlpha=1; }
}

/* ---------- Overlays ---------- */
function drawOverlays(){
  ctx.setTransform(scale*dpr,0,0,scale*dpr,offX*dpr,offY*dpr);
  ctx.save(); ctx.beginPath(); ctx.rect(0,0,VW,VH); ctx.clip(); ctx.textAlign='center';
  if(game.state===S.MENU){
    panel(); title('SAUSAGE SWING',VH*0.24);
    ctx.save(); ctx.translate(VW/2,VH*0.38); ctx.scale(1.5,1.5);
    const sp=player; player={mode:'swing',ax:0,ay:-90,x:0,y:0,vx:0,vy:0,legPh:game.t*0.1,r:15,face:'happy',iframe:0};
    const a=game.armed; game.armed=false; drawPlayer(player); game.armed=a; player=sp; ctx.restore();
    body(['Tap a TREETOP to grab it & swing.','Let go to fly to the next tree.','SHAKE the phone to swing higher.','Two fingers to climb up the rope.','Grab 🌭 mini-sausages & the 🍳 pan —','beat the 🦍 GORILLA every 3rd level!'],VH*0.51);
    if(hasSave()){
      const s=loadProgress();
      cta('CONTINUE • Lvl '+s.level, VH*0.80);
      // "New game" pill
      ctx.fillStyle='rgba(255,255,255,0.15)'; roundRect(VW/2-90,VH*0.855-16,180,34,17); ctx.fill();
      ctx.fillStyle='#eaf6ef'; ctx.font='bold 16px system-ui'; ctx.textAlign='center'; ctx.fillText('Start a new game',VW/2,VH*0.855+6);
    } else {
      cta('TAP TO PLAY',VH*0.82);
      if(game.best>0){ ctx.fillStyle='#eaf6ef'; ctx.font='bold 18px system-ui'; ctx.fillText('Best: '+game.best+' levels',VW/2,VH*0.89); }
    }
  } else if(game.state===S.OVER){
    panel(); title('GAME OVER',VH*0.34);
    ctx.fillStyle='#fff'; ctx.font='bold 30px system-ui'; ctx.fillText('You cleared '+game.score+(game.score===1?' level':' levels'),VW/2,VH*0.46);
    ctx.fillStyle='#ffe27a'; ctx.font='bold 20px system-ui'; ctx.fillText('Best: '+game.best,VW/2,VH*0.52);
    cta('TAP TO TRY AGAIN',VH*0.68);
  } else if(game.state===S.CLEAR){
    ctx.fillStyle='#1e5631'; ctx.font='bold 40px system-ui'; ctx.strokeStyle='#fff'; ctx.lineWidth=5;
    ctx.strokeText('LEVEL '+game.level+' CLEAR!',VW/2,VH*0.35); ctx.fillText('LEVEL '+game.level+' CLEAR!',VW/2,VH*0.35);
  } else if(game.state===S.BOSSWIN){
    ctx.fillStyle='#1e5631'; ctx.font='bold 38px system-ui'; ctx.strokeStyle='#fff'; ctx.lineWidth=5;
    ctx.strokeText('GORILLA DOWN! 🦍',VW/2,VH*0.34); ctx.fillText('GORILLA DOWN! 🦍',VW/2,VH*0.34);
  } else if(game.state===S.DYING){
    ctx.fillStyle='rgba(120,20,10,0.25)'; ctx.fillRect(0,0,VW,VH); ctx.fillStyle='#fff'; ctx.font='bold 30px system-ui'; ctx.fillText('Ouch! Lives left: '+game.lives,VW/2,VH*0.4);
  }
  ctx.restore();
}
function panel(){ ctx.fillStyle='rgba(16,30,26,0.74)'; ctx.fillRect(0,0,VW,VH); }
function title(txt,y){ ctx.fillStyle='#ffd23f'; ctx.font='bold 42px system-ui'; ctx.strokeStyle='#7a3d16'; ctx.lineWidth=6; ctx.lineJoin='round'; ctx.strokeText(txt,VW/2,y); ctx.fillText(txt,VW/2,y); }
function body(lines,y){ ctx.fillStyle='#eaf6ef'; ctx.font='16px system-ui'; lines.forEach((l,i)=>ctx.fillText(l,VW/2,y+i*24)); }
function cta(txt,y){ const w=260,h=58,x=VW/2-w/2,pulse=1+Math.sin(game.t*0.12)*0.03; ctx.save(); ctx.translate(VW/2,y); ctx.scale(pulse,pulse); ctx.translate(-VW/2,-y);
  ctx.fillStyle='#ffd23f'; roundRect(x,y-h/2,w,h,16); ctx.fill(); ctx.fillStyle='#7a3d16'; ctx.font='bold 24px system-ui'; ctx.textAlign='center'; ctx.fillText(txt,VW/2,y+8); ctx.restore(); }
function roundRect(x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }

/* ============================================================================
   MAIN LOOP
   ========================================================================== */
let acc=0, last=0; const STEP=1000/60;
function frame(now){
  if(!last) last=now; let dt=now-last; last=now; if(dt>250) dt=250; acc+=dt;
  let guard=0; while(acc>=STEP && guard++<6){ step(); acc-=STEP; }
  render(); requestAnimationFrame(frame);
}
clouds=makeClouds(); level=genLevel(1); anchors=level.anchors; trees=level.trees;
monkeys=[]; bananas=[]; particles=[]; coins=[]; birds=[]; coconuts=[]; spikes=[]; floatTexts=[];
player={x:CLIFF_W-40,y:CLIFF_TOP-STAND_DY,vx:0,vy:0,mode:'stand',ax:0,ay:0,L:0,curA:null,iframe:0,face:'happy',legPh:0,r:15,onGround:true};
requestAnimationFrame(frame);
if('serviceWorker' in navigator){ window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{})); }




</script>
